kind = "web"
previewPath = "/"
title = "Talent Platform"
version = "1.0.0"
id = "artifacts/talent-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23057

[services.development]
run = "pnpm --filter @workspace/talent-platform run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/talent-platform", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

# We use `vite preview` in production instead of the default static
# serve so the per-route SEO meta-tag plugin can run for
# `/institutions/:id/leaderboard`. Other routes fall through to the
# normal SPA index.html served by Vite's preview middleware.
[services.production.run]
args = ["pnpm", "--filter", "@workspace/talent-platform", "run", "serve"]

[services.production.run.env]
PORT = "23057"
BASE_PATH = "/"
NODE_ENV = "production"

[services.env]
PORT = "23057"
BASE_PATH = "/"
