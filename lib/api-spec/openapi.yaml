              schema: { $ref: "#/components/schemas/OkResponse" }

  /institutions/{id}/cohorts/{cohortId}/curve:
    get:
      operationId: getInstitutionCohortCurve
      tags: [institutions]
      summary: Cumulative placement curve for a cohort.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: cohortId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cohort placement curve
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionCohortCurve" }

  /me/mock-interviews:
    get:
      operationId: listMyMockInterviews
      tags: [mock-interviews]
      summary: List the candidate's mock interviews (optionally filtered by jobId)
      parameters:
        - in: query
          name: jobId
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Mock interviews
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockInterviewListResponse" }
        "403": { description: Candidate-only }
    post:
      operationId: startMockInterview
      tags: [mock-interviews]
      summary: Start (or resume) a mock interview for a specific job
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StartMockInterviewBody" }
      responses:
        "200":
          description: Existing in-progress interview was returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockInterview" }
        "201":
          description: New interview created with generated questions
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockInterview" }
        "403": { description: Candidate-only }
        "404": { description: Job or candidate not found }
        "429": { description: Daily AI limit reached }
        "503": { description: AI service unavailable }

  /me/mock-interviews/{id}:
    get:
      operationId: getMockInterview
      tags: [mock-interviews]
      summary: Fetch one mock interview (candidate, admin, or owning employer)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Mock interview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockInterview" }
        "403": { description: Not allowed }
        "404": { description: Not found }

  /me/mock-interviews/{id}/answer:
    post:
      operationId: answerMockInterview
      tags: [mock-interviews]
      summary: Submit an answer to the next pending question and receive its score
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnswerMockInterviewBody" }
      responses:
        "200":
          description: Answer scored, transcript updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnswerMockInterviewResponse" }
        "400": { description: Invalid answer }
        "403": { description: Not allowed }
        "404": { description: Not found }
        "409": { description: Out-of-order or interview not in progress }
        "429": { description: Daily AI limit reached }
        "503": { description: AI service unavailable }

  /me/mock-interviews/{id}/finalise:
    post:
      operationId: finaliseMockInterview
      tags: [mock-interviews]
      summary: Aggregate sub-scores, finalise the transcript, attach to a pre-existing application if any
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Finalised mock interview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MockInterview" }
        "400": { description: Nothing to finalise }
        "403": { description: Not allowed }
        "404": { description: Not found }
        "409": { description: Cannot finalise }

  /me/career-constellation:
    get:
      operationId: getMyCareerConstellation
      tags: [me]
      summary: Aggregated role nodes with the candidate's missing-skill distance
      description: |
        Returns the candidate's current skills plus a list of role
        clusters (jobs grouped by normalized title) the candidate is
        0, 1, or 2 skills away from. Used by the dashboard's Career
        Constellation graph and the mobile list view.
      responses:
        "200":
          description: Constellation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CareerConstellation" }
        "401": { description: Not authenticated }
        "403": { description: Only candidates have a career constellation }

  /me/growth-plan:
    get:
      operationId: getMyGrowthPlan
      tags: [growth-plan]
      summary: List the current candidate's growth-plan items
      description: |
        Returns the active and completed skills in the candidate's growth
        plan. If no plan exists yet, or the newest active row is older
        than 7 days, the analyser is run inline to refresh it.
      responses:
        "200":
          description: Growth plan items
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/GrowthPlanItem" }
        "401": { description: Not authenticated }
        "403": { description: Only candidates have a growth plan }

  /me/growth-plan/{skill}/add:
    post:
      operationId: addGrowthSkill
      tags: [growth-plan]
      summary: Add a skill to the candidate's growth plan
      description: |
        Surfaced by the Career Constellation "Add to growth plan" button.
        Idempotent — re-adding flips a dismissed or completed row back
        to active.
      parameters:
        - in: path
          name: skill
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "400": { description: Invalid skill }
        "401": { description: Not authenticated }
        "403": { description: Only candidates have a growth plan }

  /me/growth-plan/{skill}/complete:
    post:
      operationId: completeGrowthSkill
      tags: [growth-plan]
      summary: Mark a growth-plan skill complete and re-ping past employers
      parameters:
        - in: path
          name: skill
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                verificationUrl:
                  type: string
                  format: uri
                  maxLength: 500
      responses:
        "200":
          description: Marked complete
          content:
            application/json:
              schema:
                type: object
                required: [ok, employersNotified]
                properties:
                  ok: { type: boolean }
                  employersNotified: { type: integer }
        "400": { description: Invalid payload }
        "401": { description: Not authenticated }
        "403": { description: Only candidates have a growth plan }
        "404": { description: Skill not in your growth plan }
        "409": { description: Skill was dismissed }

  /me/growth-plan/{skill}/dismiss:
    post:
      operationId: dismissGrowthSkill
      tags: [growth-plan]
      summary: Hide a growth-plan skill so the analyser won't re-add it
      parameters:
        - in: path
          name: skill
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Dismissed (idempotent)
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "401": { description: Not authenticated }
        "403": { description: Only candidates have a growth plan }

  /institutions/{id}/api-keys:
    get:
      operationId: listInstitutionApiKeys
      tags: [institution-api-keys, institutions]
      summary: List API keys for an institution (owner or admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: API keys (plaintext is never returned here)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstitutionApiKey" }
        "400": { description: Invalid id }
        "401": { description: Not authenticated }
        "403": { description: Owners or admin only }
    post:
      operationId: createInstitutionApiKey
      tags: [institution-api-keys, institutions]
      summary: |
        Mint a new API key. The plaintext key is returned ONCE in the
        `key` field; only its SHA-256 is persisted. Institution Pro only.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  maxLength: 80
                  description: Optional human label. Defaults to "Untitled key".
      responses:
        "201":
          description: Created — plaintext returned exactly once.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionApiKeyCreated" }
        "400": { description: Invalid id or label too long }
        "401": { description: Not authenticated }
        "402":
          description: Institution Pro required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequiresUpgrade" }
        "403": { description: Owners only }

  /institutions/{id}/api-keys/{keyId}:
    delete:
      operationId: revokeInstitutionApiKey
      tags: [institution-api-keys, institutions]
      summary: Revoke (soft-delete) an API key. Idempotent against a re-revoke.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: keyId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "400": { description: Invalid id }
        "401": { description: Not authenticated }
        "403": { description: Owners only }
        "404": { description: Key not found or already revoked }

  /v1/institutions/students:
    get:
      operationId: sisListStudents
      tags: [institution-api-keys]
      summary: |
        Server-to-server SIS endpoint. Authenticates via
        `Authorization: Bearer <key>` (no session cookie). Returns the
        verified roster for the institution that minted the key.
      security:
        - InstitutionApiKey: []
      responses:
        "200":
          description: Verified roster
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SisStudentRoster" }
        "401": { description: "Missing, invalid, or revoked API key" }
        "402":
          description: Institution Pro required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequiresUpgrade" }

components:
  securitySchemes:
    InstitutionApiKey:
      type: http
      scheme: bearer
      bearerFormat: jum_<hex>
      description: Institution-issued API key (prefixed `jum_`). Pro only.
  schemas:
    RequiresUpgrade:
      type: object
      required: [error, requiresUpgrade, kind]
      properties:
        error: { type: string }
        requiresUpgrade: { type: boolean, enum: [true] }
        kind: { type: string }
    InstitutionApiKey:
      type: object
      required: [id, label, prefix, createdAt]
      properties:
        id: { type: integer }
        label: { type: string }
        prefix:
          type: string
          description: First 12 chars of the plaintext key (e.g. `jum_a1b2c3d4`).
        createdAt: { type: string, format: date-time }
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true
    InstitutionApiKeyCreated:
      type: object
      required: [id, label, prefix, key, createdAt]
      properties:
        id: { type: integer }
        label: { type: string }
        prefix: { type: string }
        key:
          type: string
          description: |
            The plaintext key. Returned exactly ONCE on creation; only its
            SHA-256 hash is stored server-side. Treat as a secret.
        createdAt: { type: string, format: date-time }
    SisStudentRow:
      type: object
      required: [candidateId, fullName, email, verifiedAt]
      properties:
        candidateId: { type: integer }
        fullName: { type: string }
        email: { type: string }
        phone: { type: string, nullable: true }
        verifiedAt: { type: string, format: date-time }
        verifiedByName: { type: string, nullable: true }
        facultyName: { type: string, nullable: true }
        departmentName: { type: string, nullable: true }
    SisStudentRoster:
      type: object
      required: [institutionId, generatedAt, students]
      properties:
        institutionId: { type: integer }
        generatedAt: { type: string, format: date-time }
        students:
          type: array
          items: { $ref: "#/components/schemas/SisStudentRow" }
    GrowthPlanResource:
      type: object
      required: [title, url, estMinutes]
      properties:
        title: { type: string }
        url: { type: string, format: uri }
        estMinutes: { type: integer }
    GrowthPlanItem:
      type: object
      required:
        [id, skill, status, addedAt, rejectionCount, resources, estMinutes]
      properties:
        id: { type: integer }
        skill: { type: string }
        status:
          type: string
          # GET /me/growth-plan only ever returns public states — internal
          # ones (dismissed/superseded) are filtered server-side.
          enum: [active, completed]
        addedAt: { type: string, format: date-time }
        completedAt:
          type: string
          format: date-time
          nullable: true
        targetDate:
          type: string
          format: date-time
          nullable: true
        rejectionCount: { type: integer }
        verificationUrl:
          type: string
          nullable: true
        resources:
          type: array
          items: { $ref: "#/components/schemas/GrowthPlanResource" }
        estMinutes: { type: integer }
    OpenWindow:
      type: object
      required: [id, candidateId, opensAt, closesAt, isActive]
      properties:
        id: { type: integer }
        candidateId: { type: integer }
        opensAt: { type: string, format: date-time }
        closesAt: { type: string, format: date-time }
        isActive: { type: boolean }
    OpenCandidateCard:
      type: object
      description: |
        Anonymised marketplace card. Never includes name, email, phone, or
        avatar — only the window id (the public handle), headline, skills,
        talent score, generic location, and institution name.
      required: [id, closesAt, headline, location, talentScore, yearsExperience, skills]
      properties:
        id: { type: integer, description: Window id (use this to post an offer) }
        closesAt: { type: string, format: date-time }
        headline: { type: string }
        location: { type: string }
        talentScore: { type: integer }
        yearsExperience: { type: integer }
        skills:
          type: array
          items: { type: string }
        institutionName: { type: string, nullable: true }
    ReverseOfferInput:
      type: object
      required: [jobTitle, salaryMin, salaryMax]
      properties:
        jobTitle: { type: string, minLength: 2, maxLength: 200 }
        salaryMin: { type: integer, minimum: 0 }
        salaryMax: { type: integer, minimum: 0 }
        currency: { type: string, default: USD }
        startDate: { type: string, format: date }
        note: { type: string, maxLength: 2000 }
    ReverseOffer:
      type: object
      description: |
        Reverse offer payload. `candidateId` is omitted from employer-facing
        responses (post-offer, sent-offers) for any non-accepted offer to
        preserve the candidate's anonymity. It is always present on the
        candidate's own inbox responses.
      required:
        [id, employerId, jobTitle, salaryMin, salaryMax,
         currency, note, status, createdAt, updatedAt]
      properties:
        id: { type: integer }
        candidateId: { type: integer, nullable: true }
        employerId: { type: integer }
        employerName: { type: string, nullable: true }
        employerLogoUrl: { type: string, nullable: true }
        candidateName: { type: string, nullable: true }
        candidateHeadline: { type: string, nullable: true }
        candidateAvatarUrl: { type: string, nullable: true }
        jobTitle: { type: string }
        salaryMin: { type: integer }
        salaryMax: { type: integer }
        currency: { type: string }
        startDate: { type: string, nullable: true }
        note: { type: string }
        status:
          type: string
          enum: [pending, accepted, declined, countered, expired]
        parentOfferId: { type: integer, nullable: true }
        applicationId: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Error:
      type: object
      description: |
        Standard error response body. The `error` field is a human-readable
        message safe to surface in the UI. The `code` field, when present,
        is a stable machine-readable identifier clients can branch on (e.g.
        to pick an alert title or decide whether retrying makes sense).
        Endpoints that don't yet emit a structured code may omit `code`.
      properties:
        error: { type: string }
        code:
          type: string
          description: |
            Stable error code. The list below enumerates the codes currently
            emitted by the Stripe-backed checkout-session creation endpoints
            (`createBoostCheckout`, `createCvCheckout`). The corresponding
            verify endpoints (`verifyBoostCheckout`, `verifyCvCheckout`) only
            emit `internal_error` today; their other 4xx responses omit
            `code`. Other endpoints may add new codes over time, so clients
            should treat unknown values defensively.
          enum:
            - stripe_token_missing
            - stripe_connector_unreachable
            - stripe_connector_status
            - stripe_not_configured
            - stripe_connection_error
            - stripe_auth_error
            - stripe_rate_limited
            - stripe_invalid_request
            - stripe_api_error
            - stripe_permission_error
            - stripe_error
            - stripe_no_url
            - internal_error
      required: [error]

    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    AuthUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [candidate, employer, institution, admin]
        status:
          type: string
          enum: [pending, active, rejected, invited]
        orgRole: { type: string, nullable: true }
        candidateId: { type: integer, nullable: true }
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
        assignedDepartmentId:
          type: integer
          nullable: true
          description: Department scope for institution staff (e.g. HoD). Null when org-wide.
        assignedFacultyId:
          type: integer
          nullable: true
          description: Faculty scope for institution staff (typically Dean). Null when not faculty-scoped.
        avatarUrl:
          type: string
          nullable: true
          description: Normalized object storage path (e.g. /objects/uploads/<id>) for the user's avatar image.
        phone: { type: string, nullable: true }
        title: { type: string, nullable: true, description: "Job title within the user's organization (free text)." }
        bio: { type: string, nullable: true }
        permissions:
          type: array
          items: { type: string }
          description: Effective admin permission keys; empty for non-admins.
      required:
        [id, email, fullName, role, status, orgRole, candidateId, employerId, institutionId, avatarUrl, phone, title, bio, permissions]

    ProfileUpdateRequest:
      type: object
      description: |
        Universal personal-profile update. All fields are optional; only the
        fields supplied are written. Pass null on a nullable field to clear it.
      properties:
        fullName: { type: string, minLength: 1, maxLength: 200 }
        phone: { type: string, nullable: true, maxLength: 50 }
        title: { type: string, nullable: true, maxLength: 200 }
        bio: { type: string, nullable: true, maxLength: 2000 }
        avatarUrl:
          type: string
          nullable: true
          description: Normalized object path returned by the upload endpoint, or null to remove the avatar.

    UploadUrlRequest:
      type: object
      properties:
        name: { type: string }
        size: { type: integer }
        contentType: { type: string }
      required: [name, size, contentType]

    UploadUrlResponseMetadata:
      type: object
      properties:
        name: { type: string }
        size: { type: integer }
        contentType: { type: string }
      required: [name, size, contentType]

    UploadUrlResponse:
      type: object
      properties:
        uploadURL: { type: string, description: "Presigned PUT URL the client uploads the file to." }
        objectPath: { type: string, description: "Normalized object path (e.g. /objects/uploads/<id>) to persist as a reference." }
        metadata: { $ref: "#/components/schemas/UploadUrlResponseMetadata" }
      required: [uploadURL, objectPath, metadata]

    AuthSession:
      type: object
      properties:
        user:
          oneOf:
            - { $ref: "#/components/schemas/AuthUser" }
            - { type: "null" }
        sessionToken:
          type: string
          description: |
            Signed session token returned by `/auth/login`.  Web clients
            running in cookie-restricted contexts (nested iframe previews,
            third-party-cookie-blocked browsers) should persist this and
            replay it via `Authorization: Bearer <token>` on every API
            request.  Other clients can ignore it: the normal session
            cookie is always set in parallel.
      required: [user]

    RegisterRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [candidate, employer, institution]
        submittedData:
          type: object
          additionalProperties: true
      required: [email, password, fullName, role]

    RegisterResponse:
      type: object
      properties:
        message: { type: string }
      required: [message]

    LoginRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    SetupPasswordRequest:
      type: object
      properties:
        token: { type: string }
        password: { type: string }
      required: [token, password]

    ForgotPasswordRequest:
      type: object
      properties:
        email: { type: string }
      required: [email]

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }
      required: [currentPassword, newPassword]

    SetupTokenInfo:
      type: object
      properties:
        email: { type: string }
        fullName: { type: string }
        role: { type: string }
      required: [email, fullName, role]

    Registration:
      type: object
      properties:
        registrationId: { type: integer }
        userId: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role: { type: string }
        userStatus: { type: string }
        registrationCreatedAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time, nullable: true }
        decisionNote: { type: string, nullable: true }
        candidateId: { type: integer, nullable: true }
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
        submittedData:
          type: object
          additionalProperties: true
      required: [registrationId, userId, email, fullName, role, userStatus, registrationCreatedAt, submittedData]

    OnboardRequest:
      type: object
      properties:
        role:
          type: string
          enum: [employer, institution]
        email: { type: string }
        fullName: { type: string }
        entity:
          type: object
          additionalProperties: true
      required: [role, email, fullName, entity]

    OnboardResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id: { type: integer }
            email: { type: string }
            fullName: { type: string }
            role: { type: string }
          required: [id, email, fullName, role]
        setupUrl:
          type: string
          nullable: true
          description: One-time password setup URL. Only returned when emailSent is false (no email provider configured); otherwise null so the link cannot leak via the admin UI.
        expiresAt: { type: string, format: date-time }
        emailSent:
          type: boolean
          description: True if the setup link was delivered by the email provider; false if email is not configured.
      required: [user, expiresAt, emailSent]

    OnboardedUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
      required: [id, email, fullName, role, status, createdAt]

    RegistrationDecisionBody:
      type: object
      properties:
        note: { type: string }

    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    TrashItem:
      type: object
      description: |
        Minimal representation of a soft-deleted row shown in the admin
        Trash console. Returned by `/admin/trash/{candidates|employers|institutions|jobs}`.
      properties:
        id: { type: integer }
        label:
          type: string
          description: Human-readable name (candidate fullName, employer/institution name, job title).
        secondary:
          type: string
          nullable: true
          description: Optional secondary line (e.g. candidate email, employer industry, institution location, job's owning employer).
        deletedAt:
          type: string
          format: date-time
          description: When the row was soft-deleted.
        deletedBy:
          type: integer
          nullable: true
          description: User id of the admin who performed the soft-delete. Null for rows deleted before audit logging was added, or via cascade where the actor is unknown.
        deletedByName:
          type: string
          nullable: true
          description: Full name of the soft-deleter, resolved from `users`. Null when `deletedBy` is null or the user record was hard-removed.
      required: [id, label, deletedAt]

    TrashSettings:
      type: object
      description: |
        Server-side trash retention configuration. The auto-purge worker
        hard-deletes soft-deleted rows whose `deleted_at` is older than
        `retentionDays`. Configured via the `TRASH_RETENTION_DAYS` env var.
      properties:
        retentionDays:
          type: integer
          minimum: 1
          description: Days a soft-deleted row remains restorable before auto-purge.
      required: [retentionDays]

    SetEmployerVerifiedRequest:
      type: object
      properties:
        verified: { type: boolean }
      required: [verified]

    SetEmployerVerifiedResponse:
      type: object
      properties:
        ok: { type: boolean }
        verified: { type: boolean }
      required: [ok, verified]

    AdminApplicationListResponse:
      type: object
      properties:
        applications:
          type: array
          items: { $ref: "#/components/schemas/Application" }
      required: [applications]

    HiresAnalyticsPoint:
      type: object
      properties:
        periodStart: { type: string, format: date-time }
        label: { type: string }
        count: { type: integer }
      required: [periodStart, label, count]

    HiresAnalyticsResponse:
      type: object
      properties:
        bucket:
          type: string
          enum: [day, week, month, year]
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        total: { type: integer }
        points:
          type: array
          items: { $ref: "#/components/schemas/HiresAnalyticsPoint" }
      required: [bucket, from, to, total, points]

    RevenueBucketTotal:
      type: object
      properties:
        grossSubunits: { type: integer }
        transactions: { type: integer }
      required: [grossSubunits, transactions]

    RevenueByCategory:
      type: object
      properties:
        candidate: { $ref: "#/components/schemas/RevenueBucketTotal" }
        institution: { $ref: "#/components/schemas/RevenueBucketTotal" }
        employer: { $ref: "#/components/schemas/RevenueBucketTotal" }
        other: { $ref: "#/components/schemas/RevenueBucketTotal" }
      required: [candidate, institution, employer, other]

    RevenueByProvider:
      type: object
      properties:
        stripe: { $ref: "#/components/schemas/RevenueBucketTotal" }
        paystack: { $ref: "#/components/schemas/RevenueBucketTotal" }
      required: [stripe, paystack]

    RevenueCurrencyRollup:
      type: object
      properties:
        currency: { type: string }
        grossSubunits: { type: integer }
        transactions: { type: integer }
        byCategory: { $ref: "#/components/schemas/RevenueByCategory" }
        byProvider: { $ref: "#/components/schemas/RevenueByProvider" }
      required: [currency, grossSubunits, transactions, byCategory, byProvider]

    AdminRevenueSummaryResponse:
      type: object
      properties:
        currencies:
          type: array
          items: { $ref: "#/components/schemas/RevenueCurrencyRollup" }
      required: [currencies]

    RevenueTimeseriesPoint:
      type: object
      properties:
        bucketStart: { type: string, format: date-time }
        currency: { type: string }
        category:
          type: string
          enum: [candidate, institution, employer, other]
        grossSubunits: { type: integer }
        transactions: { type: integer }
      required: [bucketStart, currency, category, grossSubunits, transactions]

    AdminRevenueTimeseriesResponse:
      type: object
      properties:
        bucket:
          type: string
          enum: [day, week, month]
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        points:
          type: array
          items: { $ref: "#/components/schemas/RevenueTimeseriesPoint" }
      required: [bucket, from, to, points]

    AdminAccount:
      type: object
      properties:
        userId: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [candidate, employer, institution, admin]
        status:
          type: string
          enum: [pending, active, rejected, invited, disabled]
        candidateId: { type: integer, nullable: true }
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
      required:
        - userId
        - email
        - fullName
        - role
        - status
        - candidateId
        - employerId
        - institutionId
        - createdAt

    AdminAccountsResponse:
      type: object
      properties:
        accounts:
          type: array
          items: { $ref: "#/components/schemas/AdminAccount" }
      required: [accounts]

    AdminUserStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, disabled]

    InstitutionAnalyticsRow:
      type: object
      properties:
        institutionId: { type: integer }
        institutionName: { type: string }
        location: { type: string }
        candidateCount: { type: integer }
        hiredCount: { type: integer }
        applicationCount: { type: integer }
      required:
        - institutionId
        - institutionName
        - location
        - candidateCount
        - hiredCount
        - applicationCount

    InstitutionAnalyticsResponse:
      type: object
      properties:
        totalCandidates: { type: integer }
        totalHires: { type: integer }
        rows:
          type: array
          items: { $ref: "#/components/schemas/InstitutionAnalyticsRow" }
      required: [totalCandidates, totalHires, rows]

    EmployerAnalyticsRow:
      type: object
      properties:
        employerId: { type: integer }
        employerName: { type: string }
        industry: { type: string }
        jobsCount: { type: integer }
        applicationsCount: { type: integer }
        hiresCount: { type: integer }
        uniqueCandidatesHired: { type: integer }
      required:
        - employerId
        - employerName
        - industry
        - jobsCount
        - applicationsCount
        - hiresCount
        - uniqueCandidatesHired

    EmployerAnalyticsResponse:
      type: object
      properties:
        totalEmployers: { type: integer }
        totalHires: { type: integer }
        rows:
          type: array
          items: { $ref: "#/components/schemas/EmployerAnalyticsRow" }
      required: [totalEmployers, totalHires, rows]

    VerifyStudentResponse:
      type: object
      properties:
        ok: { type: boolean }
        verifiedAt: { type: string, format: date-time }
      required: [ok, verifiedAt]

    Skill:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: string }
      required: [id, name, category]

    Candidate:
      type: object
      properties:
        id: { type: integer }
        fullName: { type: string }
        headline: { type: string }
        bio: { type: string }
        location: { type: string }
        avatarUrl: { type: string }
        email: { type: string }
        phone: { type: string }
        portfolioUrl: { type: string, nullable: true }
        videoIntroUrl: { type: string, nullable: true }
        availability:
          type: string
          enum: [open, employed, not_looking]
        yearsExperience: { type: integer }
        talentScore: { type: integer }
        isBoosted: { type: boolean }
        boostExpiresAt:
          type: string
          format: date-time
          nullable: true
          description: When the active boost expires. Null when not boosted.
        openToOffers:
          type: boolean
          description: |
            Candidate-controlled signal that they are actively considering
            new opportunities. Independent from `availability`. Employers
            can filter the candidate search to only "open" candidates.
        openToOffersSince:
          type: string
          format: date-time
          nullable: true
          description: When the candidate last flipped openToOffers to true.
        institutionId: { type: integer, nullable: true }
        institutionName: { type: string, nullable: true }
        institutions:
          type: array
          description: All institutions this candidate is affiliated with (primary first).
          items:
            $ref: "#/components/schemas/CandidateInstitutionLink"
        skills:
          type: array
          items: { type: string }
        verifiedSkills:
          type: array
          description: |
            Active (not-revoked) skill verifications issued by institutions.
            Each row carries the institution that issued it and when.
          items:
            $ref: "#/components/schemas/VerifiedSkill"
        backgroundCheck:
          $ref: "#/components/schemas/BackgroundCheck"
        verifiedByPremium:
          type: boolean
          description: |
            True when the candidate has at least one verified affiliation
            with an institution on an active Pro subscription. Drives the
            employer-side "Pro" ribbon and the matching tie-break bonus.
        createdAt: { type: string, format: date-time }
      required:
        - id
        - fullName
        - headline
        - bio
        - location
        - avatarUrl
        - email
        - phone
        - availability
        - yearsExperience
        - talentScore
        - isBoosted
        - openToOffers
        - institutions
        - skills
        - verifiedSkills
        - backgroundCheck
        - createdAt

    VerifiedSkill:
      type: object
      properties:
        id: { type: integer }
        skill: { type: string }
        institutionId: { type: integer }
        institutionName: { type: string }
        institutionLogoUrl: { type: string, nullable: true }
        issuedAt: { type: string, format: date-time }
        issuedByName: { type: string, nullable: true }
        note: { type: string, nullable: true }
      required: [id, skill, institutionId, institutionName, issuedAt]

    BackgroundCheck:
      type: object
      properties:
        status:
          type: string
          enum: [not_started, in_progress, passed, failed]
        updatedAt: { type: string, format: date-time, nullable: true }
        updatedByName: { type: string, nullable: true }
      required: [status]

    PublicReference:
      type: object
      description: |
        Submitted reference safe to display to anyone who can see the
        candidate. Never includes the referee's email — only the
        self-declared name + role they entered when submitting.
      properties:
        id: { type: integer }
        relationship:
          type: string
          enum: [lecturer, past_employer, colleague, other]
        submittedRefereeName: { type: string }
        submittedRefereeRole: { type: string, nullable: true }
        wouldRehire: { type: boolean, nullable: true }
        strengths: { type: string }
        submittedAt: { type: string, format: date-time }
      required: [id, relationship, submittedRefereeName, strengths, submittedAt]

    OwnReferenceRequest:
      type: object
      description: |
        A reference request as seen by the candidate who created it.
        Includes status (pending vs submitted) and a redacted email so
        the candidate remembers who they asked.
      properties:
        id: { type: integer }
        relationship:
          type: string
          enum: [lecturer, past_employer, colleague, other]
        refereeEmailMasked:
          type: string
          description: e.g. "j***@example.com"
        requestedAt: { type: string, format: date-time }
        submittedAt: { type: string, format: date-time, nullable: true }
        submittedRefereeName: { type: string, nullable: true }
        hiddenAt: { type: string, format: date-time, nullable: true }
        shareUrl:
          type: string
          nullable: true
          description: |
            Public form URL the candidate can hand to the referee if the
            email link didn't arrive. Only returned in the create response,
            not on subsequent reads.
      required: [id, relationship, refereeEmailMasked, requestedAt]

    RefereeFormView:
      type: object
      description: Public view of the form a referee fills out via tokenised link.
      properties:
        candidateName: { type: string }
        candidateHeadline: { type: string }
        relationship:
          type: string
          enum: [lecturer, past_employer, colleague, other]
        alreadySubmitted: { type: boolean }
      required: [candidateName, candidateHeadline, relationship, alreadySubmitted]

    IssueSkillVerificationRequest:
      type: object
      properties:
        skill: { type: string, minLength: 1, maxLength: 80 }
        note: { type: string, maxLength: 500, nullable: true }
      required: [skill]

    RequestReferenceRequest:
      type: object
      properties:
        refereeEmail: { type: string, format: email, maxLength: 320 }
        relationship:
          type: string
          enum: [lecturer, past_employer, colleague, other]
      required: [refereeEmail, relationship]

    SubmitReferenceRequest:
      type: object
      properties:
        refereeName: { type: string, minLength: 1, maxLength: 200 }
        refereeRole: { type: string, maxLength: 200, nullable: true }
        wouldRehire: { type: boolean, nullable: true }
        strengths: { type: string, minLength: 10, maxLength: 4000 }
      required: [refereeName, strengths]

    SetBackgroundCheckRequest:
      type: object
      properties:
        status:
          type: string
          enum: [not_started, in_progress, passed, failed]
      required: [status]

    CandidateInstitutionLink:
      type: object
      properties:
        id: { type: integer, description: "Institution id" }
        name: { type: string }
        type: { type: string }
        logoUrl: { type: string }
        isPrimary: { type: boolean }
        isVerified:
          type: boolean
          description: True if this institution has explicitly verified the candidate as a real student.
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        departmentId:
          type: integer
          nullable: true
          description: Department/program within this institution. Null when unassigned.
        departmentName:
          type: string
          nullable: true
          description: Resolved department/program name. Null when unassigned.
        facultyId:
          type: integer
          nullable: true
          description: |
            Parent faculty of the assigned department, derived from the
            department row. Null if the institution doesn't use faculties
            or the candidate has no department selected.
        facultyName:
          type: string
          nullable: true
          description: Resolved faculty name. Null when no faculty.
      required: [id, name, type, logoUrl, isPrimary, isVerified]

    CandidateDetail:
      allOf:
        - $ref: "#/components/schemas/Candidate"
        - type: object
          properties:
            education:
              type: array
              items: { $ref: "#/components/schemas/EducationEntry" }
            experience:
              type: array
              items: { $ref: "#/components/schemas/ExperienceEntry" }
            certifications:
              type: array
              items: { $ref: "#/components/schemas/Certification" }
            badges:
              type: array
              items: { $ref: "#/components/schemas/Badge" }
            references:
              type: array
              description: Submitted, non-hidden references. Public-safe (no emails).
              items: { $ref: "#/components/schemas/PublicReference" }
          required: [education, experience, certifications, badges, references]

    EducationEntry:
      type: object
      properties:
        id: { type: integer }
        institution: { type: string }
        degree: { type: string }
        fieldOfStudy: { type: string }
        startYear: { type: integer }
        endYear: { type: integer, nullable: true }
      required: [id, institution, degree, fieldOfStudy, startYear]

    EducationEntryInput:
      type: object
      description: |
        Input shape for replacing a candidate's self-reported education
        entries via PATCH /candidates/{id}. The id field is omitted; the
        server replaces all entries.
      properties:
        institution: { type: string, minLength: 1, maxLength: 200 }
        degree: { type: string, minLength: 1, maxLength: 200 }
        fieldOfStudy: { type: string, minLength: 1, maxLength: 200 }
        startYear: { type: integer, minimum: 1900, maximum: 2100 }
        endYear: { type: integer, minimum: 1900, maximum: 2100, nullable: true }
      required: [institution, degree, fieldOfStudy, startYear]

    ExperienceEntry:
      type: object
      properties:
        id: { type: integer }
        # employerId links the entry to an Employer record on the platform
        # so we can show the company logo and let viewers click through to
        # the employer page. Null when the candidate typed the company by
        # hand (free text in `company`).
        employerId: { type: integer, nullable: true }
        # employerLogoUrl is denormalized into the response so candidate
        # detail pages can render the LinkedIn-style company tile without
        # a separate fetch per entry.
        employerLogoUrl: { type: string, nullable: true }
        company: { type: string }
        title: { type: string }
        employmentType:
          type: string
          nullable: true
          enum:
            [
              full_time,
              part_time,
              self_employed,
              freelance,
              contract,
              internship,
              apprenticeship,
              seasonal,
            ]
        location: { type: string, nullable: true }
        locationType:
          type: string
          nullable: true
          enum: [on_site, hybrid, remote]
        description: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date, nullable: true }
      required: [id, company, title, description, startDate]

    ExperienceEntryInput:
      type: object
      description: |
        Input shape for replacing a candidate's work experience entries
        via PATCH /candidates/{id}. The id field is omitted; the server
        replaces all entries atomically. Either pick an employer from the
        platform via `employerId` (the server snapshots the employer's
        name into `company`) or pass a free-text `company` for off-platform
        roles. A null `endDate` means "currently working here".
      properties:
        employerId: { type: integer, nullable: true }
        company: { type: string, minLength: 1, maxLength: 200 }
        title: { type: string, minLength: 1, maxLength: 200 }
        employmentType:
          type: string
          nullable: true
          enum:
            [
              full_time,
              part_time,
              self_employed,
              freelance,
              contract,
              internship,
              apprenticeship,
              seasonal,
            ]
        location: { type: string, nullable: true, maxLength: 200 }
        locationType:
          type: string
          nullable: true
          enum: [on_site, hybrid, remote]
        description: { type: string, maxLength: 4000 }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date, nullable: true }
      required: [title, startDate]

    Certification:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        issuer: { type: string }
        issuedAt: { type: string, format: date }
      required: [id, name, issuer, issuedAt]

    Badge:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        tier:
          type: string
          enum: [bronze, silver, gold, platinum]
      required: [id, name, description, tier]

    CreateCandidate:
      type: object
      properties:
        fullName: { type: string }
        headline: { type: string }
        bio: { type: string }
        location: { type: string }
        email: { type: string }
        phone: { type: string }
        avatarUrl: { type: string }
        yearsExperience: { type: integer }
        institutionId: { type: integer, nullable: true }
        skills:
          type: array
          items: { type: string }
        availability:
          type: string
          enum: [open, employed, not_looking]
      required:
        - fullName
        - headline
        - bio
        - location
        - email
        - phone
        - yearsExperience
        - skills
        - availability

    UpdateCandidate:
      type: object
      properties:
        fullName: { type: string }
        headline: { type: string }
        bio: { type: string }
        location: { type: string }
        email: { type: string }
        phone: { type: string }
        avatarUrl: { type: string }
        yearsExperience: { type: integer }
        institutionId:
          type: integer
          nullable: true
          description: Sets the candidate's PRIMARY institution affiliation. Existing secondary affiliations are preserved.
        openToOffers:
          type: boolean
          description: |
            Toggle the "Open to offers" signal. Setting true updates
            openToOffersSince to now; setting false leaves the timestamp
            untouched as a record of the last open period.
        affiliations:
          type: array
          description: |
            Optional full replacement of the candidate's per-institution
            department assignments. When provided, every entry's
            departmentId is validated to belong to the same institution.
            Affiliations not listed here keep their current departmentId.
          items: { $ref: "#/components/schemas/CandidateAffiliationInput" }
        education:
          type: array
          description: |
            Optional full replacement of the candidate's self-reported
            education entries. When provided, the existing entries are
            deleted and replaced with this list. Omit the field to leave
            entries untouched. Pass an empty array to clear all entries.
          items: { $ref: "#/components/schemas/EducationEntryInput" }
        experience:
          type: array
          description: |
            Optional full replacement of the candidate's self-reported
            work experience entries (LinkedIn-style). When provided, the
            existing entries are deleted and replaced with this list.
            Omit the field to leave entries untouched. Pass an empty
            array to clear all entries.
          items: { $ref: "#/components/schemas/ExperienceEntryInput" }
        skills:
          type: array
          items: { type: string }
        availability:
          type: string
          enum: [open, employed, not_looking]
        isBoosted: { type: boolean }

    CandidateAffiliationInput:
      type: object
      properties:
        institutionId: { type: integer }
        departmentId:
          type: integer
          nullable: true
          description: Department/program/faculty within `institutionId`. Null clears the assignment.
      required: [institutionId]

    Employer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        tagline: { type: string }
        description: { type: string }
        industry: { type: string }
        location: { type: string }
        logoUrl: { type: string }
        coverUrl: { type: string }
        websiteUrl: { type: string }
        size:
          type: string
          enum: [startup, small, midsize, large, enterprise]
        verified: { type: boolean }
        openJobs: { type: integer }
        createdAt: { type: string, format: date-time }
        accountManagerId:
          type: integer
          nullable: true
          description: Owning account-manager admin user id (admin-only field)
        accountManagerName:
          type: string
          nullable: true
          description: Owning account-manager display name (admin-only field)
      required:
        - id
        - name
        - tagline
        - description
        - industry
        - location
        - logoUrl
        - coverUrl
        - websiteUrl
        - size
        - verified
        - openJobs
        - createdAt

    EmployerDetail:
      allOf:
        - $ref: "#/components/schemas/Employer"
        - type: object
          properties:
            jobs:
              type: array
              items: { $ref: "#/components/schemas/Job" }
          required: [jobs]

    CreateEmployer:
      type: object
      properties:
        name: { type: string }
        tagline: { type: string }
        description: { type: string }
        industry: { type: string }
        location: { type: string }
        logoUrl: { type: string }
        coverUrl: { type: string }
        websiteUrl: { type: string }
        size:
          type: string
          enum: [startup, small, midsize, large, enterprise]
      required:
        - name
        - tagline
        - description
        - industry
        - location
        - logoUrl
        - coverUrl
        - websiteUrl
        - size

    InstitutionKind:
      type: string
      description: Standardized institution kind. New values are added to the end so existing data stays valid.
      enum:
        - university
        - college
        - polytechnic
        - nursing_training
        - bootcamp
        - shs
        - vocational
        - other

    Institution:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        type: { $ref: "#/components/schemas/InstitutionKind" }
        location: { type: string }
        logoUrl: { type: string }
        websiteUrl: { type: string }
        studentCount: { type: integer }
        placementRate: { type: number }
        createdAt: { type: string, format: date-time }
        slug:
          type: string
          nullable: true
          description: |
            URL-safe slug for the public branded profile at
            `/public/institutions/{slug}`. Auto-generated from name on
            create/rename; legacy rows may be null and resolve by id.
        accountManagerId:
          type: integer
          nullable: true
          description: Owning account-manager admin user id (admin-only field)
        accountManagerName:
          type: string
          nullable: true
          description: Owning account-manager display name (admin-only field)
        publicLeaderboardEnabled:
          type: boolean
          description: When false, the public cohort placement leaderboard page returns 404 to anonymous visitors. Default true.
        bannerUrl:
          type: string
          nullable: true
          description: Pro-only branded hero banner image for the public profile.
        featuredPrograms:
          type: array
          nullable: true
          description: |
            Pro-only highlighted academic programs (e.g. flagship majors)
            shown on the public profile. Each entry is `{title, description}`.
          items:
            type: object
            properties:
              title: { type: string }
              description: { type: string }
            required: [title, description]
      required:
        - id
        - name
        - type
        - location
        - logoUrl
        - websiteUrl
        - studentCount
        - placementRate
        - createdAt
        - publicLeaderboardEnabled

    InstitutionDetail:
      allOf:
        - $ref: "#/components/schemas/Institution"
        - type: object
          properties:
            description: { type: string }
            partnerEmployers:
              type: array
              items: { $ref: "#/components/schemas/Employer" }
            faculties:
              type: array
              items: { $ref: "#/components/schemas/InstitutionFaculty" }
            departments:
              type: array
              items: { $ref: "#/components/schemas/InstitutionDepartment" }
            facilities:
              type: array
              items: { $ref: "#/components/schemas/InstitutionFacility" }
          required:
            [description, partnerEmployers, faculties, departments, facilities]

    InstitutionFaculty:
      type: object
      properties:
        id: { type: integer }
        institutionId: { type: integer }
        name: { type: string }
        code: { type: string, nullable: true }
        deanName: { type: string, nullable: true }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        [id, institutionId, name, code, deanName, description, createdAt, updatedAt]

    CreateInstitutionFaculty:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        code: { type: string, maxLength: 30, nullable: true }
        deanName: { type: string, maxLength: 200, nullable: true }
        description: { type: string, maxLength: 2000, nullable: true }
      required: [name]

    UpdateInstitutionFaculty:
      type: object
      description: All fields optional. Send null on nullable fields to clear them.
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        code: { type: string, maxLength: 30, nullable: true }
        deanName: { type: string, maxLength: 200, nullable: true }
        description: { type: string, maxLength: 2000, nullable: true }

    InstitutionDepartment:
      type: object
      properties:
        id: { type: integer }
        institutionId: { type: integer }
        facultyId: { type: integer, nullable: true }
        name: { type: string }
        code: { type: string, nullable: true }
        headName: { type: string, nullable: true }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        [id, institutionId, facultyId, name, code, headName, description, createdAt, updatedAt]

    CreateInstitutionDepartment:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        code: { type: string, maxLength: 30, nullable: true }
        headName: { type: string, maxLength: 200, nullable: true }
        description: { type: string, maxLength: 2000, nullable: true }
        facultyId: { type: integer, nullable: true }
      required: [name]

    UpdateInstitutionDepartment:
      type: object
      description: All fields optional. Send null on nullable fields to clear them.
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        code: { type: string, maxLength: 30, nullable: true }
        headName: { type: string, maxLength: 200, nullable: true }
        description: { type: string, maxLength: 2000, nullable: true }
        facultyId: { type: integer, nullable: true }

    InstitutionFacility:
      type: object
      properties:
        id: { type: integer }
        institutionId: { type: integer }
        name: { type: string }
        kind: { type: string }
        location: { type: string, nullable: true }
        description: { type: string, nullable: true }
        capacity: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, institutionId, name, kind, location, description, capacity, createdAt, updatedAt]

    CreateInstitutionFacility:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        kind: { type: string, minLength: 1, maxLength: 80 }
        location: { type: string, maxLength: 200, nullable: true }
        description: { type: string, maxLength: 2000, nullable: true }
        capacity: { type: integer, minimum: 0, nullable: true }
      required: [name, kind]

    UpdateInstitutionFacility:
      type: object
      description: All fields optional. Send null on nullable fields to clear them.
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        kind: { type: string, minLength: 1, maxLength: 80 }
        location: { type: string, maxLength: 200, nullable: true }
        description: { type: string, maxLength: 2000, nullable: true }
        capacity: { type: integer, minimum: 0, nullable: true }

    ProfileViewEmployer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        tagline: { type: string }
        industry: { type: string }
        location: { type: string }
        logoUrl: { type: string }
        websiteUrl: { type: string }
        verified: { type: boolean }
      required: [id, name, tagline, industry, location, logoUrl, websiteUrl, verified]

    ProfileViewItem:
      type: object
      properties:
        employer: { $ref: "#/components/schemas/ProfileViewEmployer" }
        viewerName: { type: string, nullable: true }
        viewerTitle: { type: string, nullable: true }
        lastViewedAt: { type: string, format: date-time }
        viewCount: { type: integer, minimum: 1 }
      required: [employer, viewerName, viewerTitle, lastViewedAt, viewCount]

    ProfileViewsResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ProfileViewItem" }
        totalViews: { type: integer, minimum: 0 }
        uniqueEmployers: { type: integer, minimum: 0 }
      required: [items, totalViews, uniqueEmployers]

    UpdateInstitutionRequest:
      type: object
      description: |
        All fields optional. Owner or registrar only. `bannerUrl` and
        `featuredPrograms` are Pro-only on the server — Starter requests
        that try to set them get a 402 with `requiresUpgrade: true`.
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        type: { $ref: "#/components/schemas/InstitutionKind" }
        location: { type: string, minLength: 1, maxLength: 200 }
        logoUrl: { type: string, maxLength: 1000 }
        websiteUrl: { type: string, maxLength: 1000 }
        description: { type: string, maxLength: 5000 }
        publicLeaderboardEnabled: { type: boolean }
        bannerUrl: { type: string, maxLength: 1000, nullable: true }
        featuredPrograms:
          type: array
          nullable: true
          maxItems: 12
          items:
            type: object
            properties:
              title: { type: string, minLength: 1, maxLength: 200 }
              description: { type: string, minLength: 1, maxLength: 1000 }
            required: [title, description]

    BulkVerifyResponse:
      type: object
      description: |
        Result buckets for bulk-verify. `matched` = newly verified
        (insert or update from unverified). `alreadyVerified` = no-op
        (was already verified). `unmatched` = no candidate account
        exists with that email.
      properties:
        matched:
          type: array
          items: { type: string, format: email }
        alreadyVerified:
          type: array
          items: { type: string, format: email }
        unmatched:
          type: array
          items: { type: string, format: email }
        summary:
          type: object
          properties:
            total: { type: integer }
            matched: { type: integer }
            alreadyVerified: { type: integer }
            unmatched: { type: integer }
          required: [total, matched, alreadyVerified, unmatched]
      required: [matched, alreadyVerified, unmatched, summary]

    InstitutionStudent:
      type: object
      properties:
        candidateId: { type: integer }
        fullName: { type: string }
        avatarUrl: { type: string }
        headline: { type: string }
        talentScore: { type: integer }
        readinessScore: { type: integer }
        status:
          type: string
          enum: [active, applying, interviewing, hired, graduated]
        currentEmployerName: { type: string, nullable: true }
        applicationsCount: { type: integer }
        isPrimaryAffiliation:
          type: boolean
          description: True if this institution is the student's primary affiliation; false if it's a secondary (e.g. transfer or bootcamp) link.
        isVerified:
          type: boolean
          description: True if this institution has explicitly verified the candidate as a real student. Unverified students are excluded from tracking metrics.
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        verifiedByName:
          type: string
          nullable: true
          description: Name of the institution staff member who verified this student.
        departmentId:
          type: integer
          nullable: true
          description: Department/program the student belongs to within this institution. Null if unassigned.
        departmentName:
          type: string
          nullable: true
          description: Resolved name of the assigned department/program. Null if unassigned.
        facultyId:
          type: integer
          nullable: true
          description: Faculty (parent of department) the student belongs to. Derived from the department. Null if the institution doesn't use faculties or the student has no department.
        facultyName:
          type: string
          nullable: true
          description: Resolved name of the parent faculty. Null when no faculty.
      required:
        - candidateId
        - fullName
        - avatarUrl
        - headline
        - talentScore
        - readinessScore
        - status
        - applicationsCount
        - isPrimaryAffiliation
        - isVerified

    CreateInstitution:
      type: object
      properties:
        name: { type: string }
        type: { $ref: "#/components/schemas/InstitutionKind" }
        location: { type: string }
        logoUrl: { type: string }
        websiteUrl: { type: string }
        description: { type: string }
      required: [name, type, location, logoUrl, websiteUrl, description]

    Job:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        employerId: { type: integer }
        employerName: { type: string }
        employerLogoUrl: { type: string }
        type:
          type: string
          enum: [internship, part_time, full_time, contract, remote]
        location: { type: string }
        remote: { type: boolean }
        salaryMin: { type: integer, nullable: true }
        salaryMax: { type: integer, nullable: true }
        currency: { type: string }
        summary: { type: string }
        skills:
          type: array
          items: { type: string }
        featured: { type: boolean }
        tier:
          type: string
          enum: [free, promoted, sponsored]
          description: Effective per-job pricing tier. 'free' is default; 'promoted' ranks higher; 'sponsored' ranks highest and triggers candidate push.
        tierExpiresAt:
          type: string
          format: date-time
          nullable: true
          description: When the current paid tier expires. Null for free jobs.
        fastTrack:
          type: boolean
          description: True when the owning employer has the 48-hour Fast-Track pledge enabled.
        applicationsCount: { type: integer }
        postedAt: { type: string, format: date-time }
      required:
        - id
        - title
        - employerId
        - employerName
        - employerLogoUrl
        - type
        - location
        - remote
        - currency
        - summary
        - skills
        - featured
        - tier
        - tierExpiresAt
        - fastTrack
        - applicationsCount
        - postedAt

    FastTrackState:
      type: object
      description: Fast-Track 48hr-response pledge state for one employer (task #76).
      properties:
        enabled: { type: boolean }
        enabledAt: { type: string, format: date-time, nullable: true }
        revokedUntil:
          type: string
          format: date-time
          nullable: true
          description: When non-null and in the future, the pledge cannot be re-enabled until this time.
        breachesLast30Days: { type: integer }
        streakDays:
          type: integer
          nullable: true
          description: Days since the most recent breach. Null when no breach has ever been recorded.
        upcomingDeadlines:
          type: array
          items:
            type: object
            properties:
              applicationId: { type: integer }
              candidateName: { type: string }
              jobTitle: { type: string }
              appliedAt: { type: string, format: date-time }
              deadlineAt: { type: string, format: date-time }
              hoursRemaining: { type: integer }
            required: [applicationId, candidateName, jobTitle, appliedAt, deadlineAt, hoursRemaining]
      required:
        - enabled
        - enabledAt
        - revokedUntil
        - breachesLast30Days
        - streakDays
        - upcomingDeadlines

    JobDetail:
      allOf:
        - $ref: "#/components/schemas/Job"
        - type: object
          properties:
            description: { type: string }
            responsibilities:
              type: array
              items: { type: string }
            requirements:
              type: array
              items: { type: string }
            benefits:
              type: array
              items: { type: string }
          required: [description, responsibilities, requirements, benefits]

    CreateJob:
      type: object
      properties:
        title: { type: string }
        employerId: { type: integer }
        type:
          type: string
          enum: [internship, part_time, full_time, contract, remote]
        location: { type: string }
        remote: { type: boolean }
        salaryMin: { type: integer, nullable: true }
        salaryMax: { type: integer, nullable: true }
        currency: { type: string }
        summary: { type: string }
        description: { type: string }
        responsibilities:
          type: array
          items: { type: string }
        requirements:
          type: array
          items: { type: string }
        benefits:
          type: array
          items: { type: string }
        skills:
          type: array
          items: { type: string }
        featured: { type: boolean }
        tier:
          type: string
          enum: [free, promoted, sponsored]
          description: Optional initial tier. Defaults to 'free'. Paid tiers require a follow-up Stripe checkout (POST /jobs/{id}/promote/checkout) to actually activate.
        targetSkills:
          type: array
          items: { type: string }
          description: Optional skill targeting filter for Sponsored push.
        targetLocation:
          type: string
          nullable: true
          description: Optional location targeting filter for Sponsored push.
        includeChallenge:
          type: boolean
          description: |
            When true (default), the server auto-attaches a default
            skill-challenge built from the job's skills. Set false to
            post without a challenge (candidates apply via cover note).
      required:
        - title
        - employerId
        - type
        - location
        - remote
        - currency
        - summary
        - description
        - responsibilities
        - requirements
        - benefits
        - skills

    Application:
      type: object
      properties:
        id: { type: integer }
        jobId: { type: integer }
        jobTitle: { type: string }
        candidateId: { type: integer }
        candidateName: { type: string }
        candidateAvatarUrl: { type: string }
        employerId: { type: integer }
        employerName: { type: string }
        employerLogoUrl: { type: string }
        status:
          type: string
          enum: [applied, screening, interview, offer, hired, rejected, withdrawn]
        matchScore: { type: integer }
        coverNote: { type: string }
        boardOrder: { type: integer }
        source:
          type: string
          enum: [browse, for_you]
          description: |
            Where the application originated. `for_you` flags swipe-right
            submissions from the mobile For You stack so employers can
            prioritize replies to high-intent applicants. Defaults to
            `browse`.
        appliedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        mockInterviewId:
          type: integer
          nullable: true
          description: Linked mock interview row id, if the candidate finalised one for this job.
        mockInterviewScore:
          type: integer
          nullable: true
          description: Overall mock-interview score 0–100, if any.
        mockInterviewBreakdown:
          nullable: true
          $ref: "#/components/schemas/MockInterviewBreakdown"
        reportedSalary:
          type: integer
          nullable: true
          description: |
            Candidate's self-reported accepted salary (whole units of
            `reportedCurrency`). Set only after the application has
            reached `hired`. Used to anonymously feed the aggregate
            band returned by `GET /salary-insights`.
        reportedCurrency:
          type: string
          nullable: true
          description: ISO-4217 currency for `reportedSalary`.
        salaryReportedAt:
          type: string
          format: date-time
          nullable: true
        endorsement:
          nullable: true
          $ref: "#/components/schemas/ApplicationEndorsement"
          description: |
            Institution co-sign on this application, if any. The
            endorsing institution's name is shown as a "Verified by
            X" badge to the employer.
        challengeScore:
          type: integer
          nullable: true
          description: |
            Score 0–100 from the candidate's skill-challenge
            submission, if the job had a challenge attached.
        challengeBreakdown:
          type: array
          nullable: true
          description: |
            Per-question grading detail for the employer review UI:
            [{ index, prompt, chosen, correct, isCorrect }]. Null if
            no challenge was attached or no submission exists.
          items: { $ref: "#/components/schemas/ChallengeBreakdownItem" }
      required:
        - id
        - jobId
        - jobTitle
        - candidateId
        - candidateName
        - candidateAvatarUrl
        - employerId
        - employerName
        - employerLogoUrl
        - status
        - matchScore
        - coverNote
        - boardOrder
        - source
        - appliedAt
        - updatedAt
        - mockInterviewId
        - mockInterviewScore
        - mockInterviewBreakdown
        - endorsement
        - challengeScore
        - challengeBreakdown

    ApplicationEndorsement:
      type: object
      properties:
        institutionId: { type: integer }
        institutionName: { type: string }
        note: { type: string, nullable: true }
        endorsedAt: { type: string, format: date-time }
      required: [institutionId, institutionName, note, endorsedAt]

    PendingEndorsementApplication:
      type: object
      description: |
        An application awaiting institution co-sign. Returned to
        institution staff scoped to their faculty/department.
      properties:
        applicationId: { type: integer }
        candidateId: { type: integer }
        candidateName: { type: string }
        candidateAvatarUrl: { type: string }
        candidateHeadline: { type: string }
        departmentId: { type: integer, nullable: true }
        departmentName: { type: string, nullable: true }
        jobId: { type: integer }
        jobTitle: { type: string }
        employerId: { type: integer }
        employerName: { type: string }
        employerLogoUrl: { type: string }
        matchScore: { type: integer }
        appliedAt: { type: string, format: date-time }
      required:
        - applicationId
        - candidateId
        - candidateName
        - candidateAvatarUrl
        - candidateHeadline
        - departmentId
        - departmentName
        - jobId
        - jobTitle
        - employerId
        - employerName
        - employerLogoUrl
        - matchScore
        - appliedAt

    EndorseApplicationRequest:
      type: object
      properties:
        note:
          type: string
          maxLength: 280
          description: Optional one-line note shown to the employer alongside the badge.
      required: []

    CreateApplication:
      type: object
      properties:
        jobId: { type: integer }
        candidateId: { type: integer }
        coverNote: { type: string }
        source:
          type: string
          enum: [browse, for_you]
          description: |
            Origin of the application. Optional; defaults to `browse`.
            The mobile For You swipe stack sends `for_you`.
      required: [jobId, candidateId, coverNote]

    ChallengeQuestionPublic:
      type: object
      description: A single skill-challenge question with answer key stripped.
      properties:
        index: { type: integer }
        prompt: { type: string }
        options:
          type: array
          items: { type: string }
      required: [index, prompt, options]

    JobChallenge:
      type: object
      properties:
        jobId: { type: integer, nullable: true }
        title: { type: string }
        passingScore: { type: integer }
        durationSeconds:
          type: integer
          description: |
            Estimated time-to-complete in seconds. The candidate
            apply gate surfaces this as "Challenge: ~N min".
        questions:
          type: array
          items: { $ref: "#/components/schemas/ChallengeQuestionPublic" }
      required: [title, passingScore, durationSeconds, questions]

    ChallengeTemplate:
      type: object
      properties:
        id: { type: integer }
        skill: { type: string }
        title: { type: string }
        description: { type: string }
        difficulty:
          type: string
          enum: [easy, medium, hard]
        questionCount: { type: integer }
        preview:
          type: array
          items: { $ref: "#/components/schemas/ChallengeQuestionPublic" }
      required: [id, skill, title, description, difficulty, questionCount, preview]

    ChallengeBreakdownItem:
      type: object
      description: |
        Per-question grading row. `chosen = -1` means the candidate
        skipped the question. `correct` (the answer-key index) is
        ONLY present for employer/admin viewers — it is stripped
        server-side for candidate and institution viewers so the
        answer key never leaks to challenge takers.
      properties:
        index: { type: integer }
        prompt: { type: string }
        chosen: { type: integer }
        correct:
          type: integer
          description: |
            Answer-key index. Present only when the viewer is an
            employer or admin; stripped for candidate / institution
            viewers.
        isCorrect: { type: boolean }
      required: [index, prompt, chosen, isCorrect]

    GenerateChallenge:
      type: object
      properties:
        skills:
          type: array
          items: { type: string }
      required: [skills]

    SubmitChallenge:
      type: object
      properties:
        answers:
          type: array
          items: { type: integer }
        source:
          type: string
          enum: [browse, for_you]
      required: [answers]

    ChallengeSubmissionResult:
      type: object
      properties:
        applicationId: { type: integer }
        score: { type: integer }
        correct: { type: integer }
        total: { type: integer }
        alreadySubmitted: { type: boolean }
        breakdown:
          type: array
          description: |
            Per-question grading detail returned to the candidate.
            The answer-key index (`correct`) is omitted server-side
            to prevent answer leakage — only `isCorrect` is included
            so the candidate sees which ones they got right.
          items:
            type: object
            properties:
              index: { type: integer }
              prompt: { type: string }
              chosen: { type: integer }
              isCorrect: { type: boolean }
            required: [index, prompt, chosen, isCorrect]
      required: [applicationId, score, correct, total, alreadySubmitted, breakdown]

    UpdateJobChallenge:
      type: object
      description: |
        Replace the challenge attached to a job. Supply either
        `questions` (full custom snapshot incl. correctIndex) OR
        `templateIds` (regenerate from these templates). Omit both
        to regenerate from the job's skills.
      properties:
        title: { type: string }
        passingScore: { type: integer }
        durationSeconds: { type: integer }
        templateIds:
          type: array
          items: { type: integer }
        overrides:
          type: array
          description: |
            Per-question employer overrides applied on top of the
            template snapshot at apply-time. Each item is a free-form
            object such as `{ index, prompt?, options?, correctIndex? }`.
            Kept as a separate array so the original template
            questions remain auditable.
          items:
            type: object
            additionalProperties: true
        questions:
          type: array
          items:
            type: object
            properties:
              prompt: { type: string }
              options:
                type: array
                items: { type: string }
              correctIndex: { type: integer }
            required: [prompt, options, correctIndex]

    UpdateApplication:
      type: object
      description: |
        At least one of `status` or `boardOrder` must be supplied.
        `boardOrder` lets the employer Kanban persist drag-and-drop sort
        within a column.
      properties:
        status:
          type: string
          enum: [applied, screening, interview, offer, hired, rejected, withdrawn]
        boardOrder:
          type: integer
          description: New sort index within the destination column. Lower = higher in the column.

    InterviewTimeSlot:
      type: object
