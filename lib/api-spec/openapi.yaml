openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Talent Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: candidates
    description: Candidate profiles
  - name: employers
    description: Employer profiles
  - name: institutions
    description: Educational institutions
  - name: jobs
    description: Job postings
  - name: applications
    description: Job applications
  - name: skills
    description: Skill catalog
  - name: dashboard
    description: Aggregated insights
  - name: auth
    description: Authentication and registration
  - name: admin
    description: Admin-only operations
  - name: storage
    description: Object storage upload helpers
  - name: boost
    description: Paid Profile Boost configuration and checkout
  - name: institution-subscription
    description: Premium yearly subscription for institutions (placement access)
  - name: employer-subscription
    description: Premium subscription gating job posts beyond the free quota
  - name: cv
    description: Premium AI CV Builder configuration, checkout, and generation
  - name: partners
    description: Admin-managed "Our Partners" landing-page section
  - name: interviews
    description: Interview scheduling between employer and candidate
  - name: ai
    description: Candidate-facing AI helpers (cover-note draft, interview prep, CV critique)
  - name: employer-pools
    description: Employer-private talent pools, message templates, and bulk outreach
  - name: mock-interviews
    description: AI-led, job-tuned mock interviews scored against a technical/communication/culture rubric
  - name: reverse-offers
    description: Open-to-offers auction windows and employer-initiated reverse offers
  - name: institution-api-keys
    description: Owner-minted SIS API keys (Institution Pro) and the public roster endpoint
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List candidates with optional filters
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: skill
          schema: { type: string }
        - in: query
          name: institutionId
          schema: { type: integer }
        - in: query
          name: minScore
          schema: { type: integer }
        - in: query
          name: openToOffers
          description: When 1, return only candidates who have flipped on the "Open to offers" signal.
          schema: { type: string, enum: ["1"] }
        - in: query
          name: verifiedSkill
          description: |
            Restrict the result to candidates who have an active institution-issued
            verification for the given skill (case-insensitive exact match).
          schema: { type: string }
        - in: query
          name: limit
          description: Page size (max 50, default 20).
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: cursor
          description: |
            Opaque pagination cursor from the previous response's
            `X-Next-Cursor` header. Omit to fetch the first page.
          schema: { type: string }
      responses:
        "200":
          description: List of candidates
          headers:
            X-Next-Cursor:
              description: |
                Pass back as `?cursor=` to fetch the next page. Absent when
                no further pages are available.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Candidate" }
    post:
      operationId: createCandidate
      tags: [candidates]
      summary: Create candidate profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCandidate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Candidate" }
  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Candidate detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateDetail" }
    patch:
      operationId: updateCandidate
      tags: [candidates]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCandidate" }
      responses:
        "200":
          description: Updated candidate detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateDetail" }

  /employers:
    get:
      operationId: listEmployers
      tags: [employers]
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: mine
          required: false
          description: When 1, account_manager admins see only employers assigned to them
          schema: { type: string, enum: ["1"] }
      responses:
        "200":
          description: Employers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Employer" }
    post:
      operationId: createEmployer
      tags: [employers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEmployer" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Employer" }
  /employers/{id}:
    get:
      operationId: getEmployer
      tags: [employers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Employer detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployerDetail" }

  /institutions:
    get:
      operationId: listInstitutions
      tags: [institutions]
      parameters:
        - in: query
          name: mine
          required: false
          description: When 1, account_manager admins see only institutions assigned to them
          schema: { type: string, enum: ["1"] }
      responses:
        "200":
          description: Institutions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Institution" }
    post:
      operationId: createInstitution
      tags: [institutions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstitution" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Institution" }
  /institutions/me:
    patch:
      operationId: updateMyInstitution
      tags: [institutions]
      summary: Update the caller's institution profile (owner or registrar).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateInstitutionRequest" }
      responses:
        "200":
          description: Updated institution
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Institution" }
  /institutions/me/faculties:
    get:
      operationId: listMyInstitutionFaculties
      tags: [institutions]
      summary: List faculties for the caller's institution.
      responses:
        "200":
          description: Faculties
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstitutionFaculty" }
    post:
      operationId: createMyInstitutionFaculty
      tags: [institutions]
      summary: Create a faculty on the caller's institution (owner / registrar).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstitutionFaculty" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionFaculty" }
  /institutions/me/faculties/{id}:
    patch:
      operationId: updateMyInstitutionFaculty
      tags: [institutions]
      summary: Update a faculty on the caller's institution (owner / registrar).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateInstitutionFaculty" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionFaculty" }
    delete:
      operationId: deleteMyInstitutionFaculty
      tags: [institutions]
      summary: Delete a faculty on the caller's institution (owner / registrar).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
  /institutions/me/departments:
    get:
      operationId: listMyInstitutionDepartments
      tags: [institutions]
      summary: List departments for the caller's institution.
      responses:
        "200":
          description: Departments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstitutionDepartment" }
    post:
      operationId: createMyInstitutionDepartment
      tags: [institutions]
      summary: Create a department on the caller's institution (owner or registrar).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstitutionDepartment" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionDepartment" }
  /institutions/me/departments/{id}:
    patch:
      operationId: updateMyInstitutionDepartment
      tags: [institutions]
      summary: Update a department on the caller's institution (owner or registrar).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateInstitutionDepartment" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionDepartment" }
    delete:
      operationId: deleteMyInstitutionDepartment
      tags: [institutions]
      summary: Delete a department on the caller's institution (owner or registrar).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
  /institutions/me/facilities:
    get:
      operationId: listMyInstitutionFacilities
      tags: [institutions]
      summary: List facilities for the caller's institution.
      responses:
        "200":
          description: Facilities
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstitutionFacility" }
    post:
      operationId: createMyInstitutionFacility
      tags: [institutions]
      summary: Create a facility on the caller's institution (owner or registrar).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstitutionFacility" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionFacility" }
  /institutions/me/facilities/{id}:
    patch:
      operationId: updateMyInstitutionFacility
      tags: [institutions]
      summary: Update a facility on the caller's institution (owner or registrar).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateInstitutionFacility" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionFacility" }
    delete:
      operationId: deleteMyInstitutionFacility
      tags: [institutions]
      summary: Delete a facility on the caller's institution (owner or registrar).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
  /public/institutions/{slugOrId}:
    get:
      operationId: getPublicInstitution
      tags: [institutions]
      summary: |
        Public branded institution profile. Anonymous; accepts either
        the URL slug or numeric id. Returns brand fields (bannerUrl,
        featuredPrograms) used by the standalone public page.
      parameters:
        - in: path
          name: slugOrId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Public institution profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Institution"
                  - type: object
                    properties:
                      description: { type: string }
                    required: [description]
        "404": { description: Not found }
  /institutions/{id}:
    get:
      operationId: getInstitution
      tags: [institutions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Institution detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionDetail" }
  /institutions/{id}/students:
    get:
      operationId: listInstitutionStudents
      tags: [institutions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: departmentId
          required: false
          description: |
            Filter by institution department/program. Owners and platform
            admins may set this to scope the roster. Non-owner staff with
            an assigned department are always hard-filtered server-side
            and cannot widen the result by omitting or changing this param.
          schema: { type: integer }
        - in: query
          name: limit
          description: Page size (max 50, default 20).
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: cursor
          description: Opaque cursor from previous `X-Next-Cursor` header.
          schema: { type: string }
      responses:
        "200":
          description: Students at institution with placement status
          headers:
            X-Next-Cursor:
              description: Pass back as `?cursor=` to fetch the next page.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstitutionStudent" }
  /institutions/{id}/students/{candidateId}/verify:
    post:
      operationId: verifyInstitutionStudent
      tags: [institutions]
      summary: Mark a candidate as a verified student of this institution.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: candidateId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyStudentResponse" }
  /institutions/{id}/students/bulk-verify:
    post:
      operationId: bulkVerifyInstitutionStudents
      tags: [institutions]
      summary: Pro-only. Bulk-verify candidates by email (max 1000 rows).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rows:
                  type: array
                  maxItems: 1000
                  items:
                    type: object
                    properties:
                      email: { type: string, format: email }
                    required: [email]
              required: [rows]
      responses:
        "200":
          description: Bulk verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkVerifyResponse" }
        "402":
          description: Pro upgrade required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  requiresUpgrade: { type: boolean }
                  kind: { type: string }
                required: [error, requiresUpgrade, kind]
  /institutions/{id}/students/{candidateId}/unverify:
    post:
      operationId: unverifyInstitutionStudent
      tags: [institutions]
      summary: Revoke verification for a previously verified student.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: candidateId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Unverified
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: type
          schema:
            type: string
            enum: [internship, part_time, full_time, contract, remote]
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: remote
          schema: { type: boolean }
        - in: query
          name: employerId
          schema: { type: integer }
        - in: query
          name: featured
          schema: { type: boolean }
        - in: query
          name: skill
          schema: { type: string }
        - in: query
          name: fastTrackOnly
          schema: { type: boolean }
          description: When true, restrict to jobs whose employer has the 48-hour Fast-Track pledge enabled.
        - in: query
          name: limit
          description: Page size (max 50, default 20).
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: cursor
          description: Opaque cursor from previous `X-Next-Cursor` header.
          schema: { type: string }
      responses:
        "200":
          description: Jobs
          headers:
            X-Next-Cursor:
              description: Pass back as `?cursor=` to fetch the next page.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Job" }
    post:
      operationId: createJob
      tags: [jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateJob" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobDetail" }
  /jobs/{id}/matches:
    get:
      operationId: getJobMatches
      tags: [jobs]
      summary: AI-style ranked candidate matches for a job
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ranked candidate matches
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CandidateMatch" }

  /challenge-templates:
    get:
      operationId: listChallengeTemplates
      tags: [jobs]
      summary: Browse reusable skill-challenge templates (employer-only).
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChallengeTemplate" }
  /challenges/generate:
    post:
      operationId: generateChallengePreview
      tags: [jobs]
      summary: |
        Build a default skill challenge for a list of required
        skills (no answer keys). Drives the preview step in the
        employer post-job flow and the sample preview on job detail.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GenerateChallenge" }
      responses:
        "200":
          description: Generated preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobChallenge" }
  /jobs/{id}/challenge:
    get:
      operationId: getJobChallenge
      tags: [jobs]
      summary: Fetch a job's skill challenge (answer keys stripped).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Job challenge
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobChallenge" }
        "404": { description: No challenge attached }
    put:
      operationId: updateJobChallenge
      tags: [jobs]
      summary: Replace the challenge attached to a job (employer-only).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateJobChallenge" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobChallenge" }
    delete:
      operationId: deleteJobChallenge
      tags: [jobs]
      summary: Remove the challenge attached to a job (employer-only).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Removed }
  /jobs/{id}/challenge/submit:
    post:
      operationId: submitJobChallenge
      tags: [jobs]
      summary: Candidate submits answers; server grades and creates the application.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitChallenge" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChallengeSubmissionResult" }
        "200":
          description: Already submitted (returns existing score)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChallengeSubmissionResult" }

  /me/employer/fast-track:
    get:
      operationId: getMyEmployerFastTrack
      tags: [employers]
      summary: Read the current Fast-Track pledge state for the signed-in employer.
      responses:
        "200":
          description: Current state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FastTrackState" }
    post:
      operationId: setMyEmployerFastTrack
      tags: [employers]
      summary: Enable or disable the Fast-Track pledge for the signed-in employer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
              required: [enabled]
      responses:
        "200":
          description: Updated state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FastTrackState" }
        "409":
          description: In cooldown after auto-revocation
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /me/daily-deck:
    get:
      operationId: getMyDailyDeck
      tags: [employers]
      summary: Today's swipe-back candidate deck for the signed-in employer.
      description: |
        Returns up to 10 high-fit candidates for the calling employer,
        ranked across the employer's active public job postings.
        The deck is cached per (employer, local calendar day) using the
        employer's `dailyDeckTimezone`, and naturally excludes anyone
        already shortlisted or dismissed.
      responses:
        "200":
          description: Today's deck
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DailyDeckResponse" }
        "403":
          description: Caller is not an employer
        "404":
          description: Employer record not found

  /me/daily-deck/{candidateId}/shortlist:
    post:
      operationId: shortlistDailyDeckCandidate
      tags: [employers]
      summary: Right-swipe — add a deck candidate to a talent pool and notify them.
      parameters:
        - in: path
          name: candidateId
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DailyDeckShortlistBody" }
      responses:
        "200":
          description: Shortlisted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DailyDeckShortlistResponse" }
        "400":
          description: Invalid candidate id or body
        "403":
          description: Caller is not an employer
        "404":
          description: Candidate, job, or pool not found

  /me/daily-deck/{candidateId}/dismiss:
    post:
      operationId: dismissDailyDeckCandidate
      tags: [employers]
      summary: Left-swipe — permanently dismiss a deck candidate for this employer (optionally scoped to one job).
      parameters:
        - in: path
          name: candidateId
          required: true
          schema: { type: integer }
      requestBody:
