openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Talent Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: candidates
    description: Candidate profiles
  - name: employers
    description: Employer profiles
  - name: institutions
    description: Educational institutions
  - name: jobs
    description: Job postings
  - name: applications
    description: Job applications
  - name: skills
    description: Skill catalog
  - name: dashboard
    description: Aggregated insights
  - name: auth
    description: Authentication and registration
  - name: admin
    description: Admin-only operations
  - name: storage
    description: Object storage upload helpers
  - name: boost
    description: Paid Profile Boost configuration and checkout
  - name: institution-subscription
    description: Premium yearly subscription for institutions (placement access)
  - name: employer-subscription
    description: Premium subscription gating job posts beyond the free quota
  - name: cv
    description: Premium AI CV Builder configuration, checkout, and generation
  - name: partners
    description: Admin-managed "Our Partners" landing-page section
  - name: interviews
    description: Interview scheduling between employer and candidate
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List candidates with optional filters
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: skill
          schema: { type: string }
        - in: query
          name: institutionId
          schema: { type: integer }
        - in: query
          name: minScore
          schema: { type: integer }
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Candidate" }
    post:
      operationId: createCandidate
      tags: [candidates]
      summary: Create candidate profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCandidate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Candidate" }
  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Candidate detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateDetail" }
    patch:
      operationId: updateCandidate
      tags: [candidates]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCandidate" }
      responses:
        "200":
          description: Updated candidate detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateDetail" }

  /employers:
    get:
      operationId: listEmployers
      tags: [employers]
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: mine
          required: false
          description: When 1, account_manager admins see only employers assigned to them
          schema: { type: string, enum: ["1"] }
      responses:
        "200":
          description: Employers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Employer" }
    post:
      operationId: createEmployer
      tags: [employers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEmployer" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Employer" }
  /employers/{id}:
    get:
      operationId: getEmployer
      tags: [employers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Employer detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployerDetail" }

  /institutions:
    get:
      operationId: listInstitutions
      tags: [institutions]
      parameters:
        - in: query
          name: mine
          required: false
          description: When 1, account_manager admins see only institutions assigned to them
          schema: { type: string, enum: ["1"] }
      responses:
        "200":
          description: Institutions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Institution" }
    post:
      operationId: createInstitution
      tags: [institutions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstitution" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Institution" }
  /institutions/me:
    patch:
      operationId: updateMyInstitution
      tags: [institutions]
      summary: Update the caller's institution profile (owner only).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateInstitutionRequest" }
      responses:
        "200":
          description: Updated institution
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Institution" }
  /institutions/me/departments:
    get:
      operationId: listMyInstitutionDepartments
      tags: [institutions]
      summary: List departments for the caller's institution.
      responses:
        "200":
          description: Departments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstitutionDepartment" }
    post:
      operationId: createMyInstitutionDepartment
      tags: [institutions]
      summary: Create a department on the caller's institution (owner only).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstitutionDepartment" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionDepartment" }
  /institutions/me/departments/{id}:
    patch:
      operationId: updateMyInstitutionDepartment
      tags: [institutions]
      summary: Update a department on the caller's institution (owner only).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateInstitutionDepartment" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionDepartment" }
    delete:
      operationId: deleteMyInstitutionDepartment
      tags: [institutions]
      summary: Delete a department on the caller's institution (owner only).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
  /institutions/me/facilities:
    get:
      operationId: listMyInstitutionFacilities
      tags: [institutions]
      summary: List facilities for the caller's institution.
      responses:
        "200":
          description: Facilities
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstitutionFacility" }
    post:
      operationId: createMyInstitutionFacility
      tags: [institutions]
      summary: Create a facility on the caller's institution (owner only).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstitutionFacility" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionFacility" }
  /institutions/me/facilities/{id}:
    patch:
      operationId: updateMyInstitutionFacility
      tags: [institutions]
      summary: Update a facility on the caller's institution (owner only).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateInstitutionFacility" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionFacility" }
    delete:
      operationId: deleteMyInstitutionFacility
      tags: [institutions]
      summary: Delete a facility on the caller's institution (owner only).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
  /institutions/{id}:
    get:
      operationId: getInstitution
      tags: [institutions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Institution detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionDetail" }
  /institutions/{id}/students:
    get:
      operationId: listInstitutionStudents
      tags: [institutions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: departmentId
          required: false
          description: |
            Filter by institution department/program. Owners and platform
            admins may set this to scope the roster. Non-owner staff with
            an assigned department are always hard-filtered server-side
            and cannot widen the result by omitting or changing this param.
          schema: { type: integer }
      responses:
        "200":
          description: Students at institution with placement status
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstitutionStudent" }
  /institutions/{id}/students/{candidateId}/verify:
    post:
      operationId: verifyInstitutionStudent
      tags: [institutions]
      summary: Mark a candidate as a verified student of this institution.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: candidateId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyStudentResponse" }
  /institutions/{id}/students/{candidateId}/unverify:
    post:
      operationId: unverifyInstitutionStudent
      tags: [institutions]
      summary: Revoke verification for a previously verified student.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: candidateId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Unverified
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: type
          schema:
            type: string
            enum: [internship, part_time, full_time, contract, remote]
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: remote
          schema: { type: boolean }
        - in: query
          name: employerId
          schema: { type: integer }
        - in: query
          name: featured
          schema: { type: boolean }
        - in: query
          name: skill
          schema: { type: string }
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Job" }
    post:
      operationId: createJob
      tags: [jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateJob" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobDetail" }
  /jobs/{id}/matches:
    get:
      operationId: getJobMatches
      tags: [jobs]
      summary: AI-style ranked candidate matches for a job
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ranked candidate matches
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CandidateMatch" }

  /candidates/{id}/recommendations:
    get:
      operationId: getCandidateRecommendations
      tags: [candidates]
      summary: AI-style ranked job recommendations for a candidate
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ranked job matches
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/JobMatch" }

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      parameters:
        - in: query
          name: candidateId
          schema: { type: integer }
        - in: query
          name: jobId
          schema: { type: integer }
        - in: query
          name: employerId
          schema: { type: integer }
        - in: query
          name: status
          schema:
            type: string
            enum: [applied, screening, interview, offer, hired, rejected, withdrawn]
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Application" }
    post:
      operationId: createApplication
      tags: [applications]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateApplication" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Application" }
  /applications/{id}:
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateApplication" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Application" }

  /applications/{id}/interview-invites:
    get:
      operationId: listInterviewInvitesForApplication
      tags: [interviews]
      summary: List all interview invites attached to an application
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Invites
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InterviewInvite" }
    post:
      operationId: createInterviewInvite
      tags: [interviews]
      summary: Employer schedules an interview by proposing 1-N time slots
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInterviewInviteRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InterviewInvite" }

  /candidates/{id}/interview-invites:
    get:
      operationId: listInterviewInvitesForCandidate
      tags: [interviews]
      summary: All interview invites for a candidate (newest first)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [proposed, accepted, declined, cancelled]
      responses:
        "200":
          description: Invites
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InterviewInvite" }

  /interview-invites/{id}:
    get:
      operationId: getInterviewInvite
      tags: [interviews]
      summary: Fetch a single interview invite (employer or owning candidate)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Invite
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InterviewInvite" }

  /interview-invites/{id}/accept:
    post:
      operationId: acceptInterviewInvite
      tags: [interviews]
      summary: Candidate accepts the invite by selecting one of the proposed slots
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcceptInterviewInviteRequest" }
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InterviewInvite" }

  /interview-invites/{id}/decline:
    post:
      operationId: declineInterviewInvite
      tags: [interviews]
      summary: Candidate declines the invite (optionally with a reason)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeclineInterviewInviteRequest" }
      responses:
        "200":
          description: Declined
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InterviewInvite" }

  /interview-invites/{id}/cancel:
    post:
      operationId: cancelInterviewInvite
      tags: [interviews]
      summary: Employer cancels a pending interview invite
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InterviewInvite" }

  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      responses:
        "200":
          description: Skills catalog
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Skill" }

  /dashboard/platform:
    get:
      operationId: getPlatformStats
      tags: [dashboard]
      summary: Admin overview metrics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformStats" }

  /dashboard/employer/{id}:
    get:
      operationId: getEmployerDashboard
      tags: [dashboard]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Employer dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployerDashboard" }

  /dashboard/institution/{id}:
    get:
      operationId: getInstitutionDashboard
      tags: [dashboard]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Institution dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionDashboard" }

  /dashboard/candidate/{id}:
    get:
      operationId: getCandidateDashboard
      tags: [dashboard]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Candidate dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateDashboard" }

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Cross-platform recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityItem" }

  /dashboard/salary-insights:
    get:
      operationId: getSalaryInsights
      tags: [dashboard]
      summary: Average salary by role/skill
      responses:
        "200":
          description: Salary insights
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SalaryInsight" }

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Registration accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterResponse" }
        "400": { description: Invalid input }
        "409":
          description: Email already registered (candidate sign-up only)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                required: [error]

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "401": { description: Invalid credentials }
        "403": { description: Account not active }

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      responses:
        "200":
          description: Current session user (or null)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }

  /auth/me/profile:
    patch:
      operationId: updateMyProfile
      tags: [auth]
      summary: Update the current user's universal profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileUpdateRequest" }
      responses:
        "200":
          description: Profile updated, returns the refreshed session user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "400": { description: Invalid input }
        "401": { description: Not authenticated }

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL to upload a file to object storage
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadUrlRequest" }
      responses:
        "200":
          description: Presigned URL granted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadUrlResponse" }
        "400": { description: Invalid input }

  /auth/setup-password:
    post:
      operationId: setupPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetupPasswordRequest" }
      responses:
        "200":
          description: Password set, user activated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "400": { description: Invalid token or password }

  /auth/forgot-password:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Request a password reset link (always returns ok=true)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordRequest" }
      responses:
        "200":
          description: Request acknowledged (does not reveal whether email is registered)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "400": { description: Invalid input }

  /auth/change-password:
    post:
