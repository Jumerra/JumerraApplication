            schema: { $ref: "#/components/schemas/CreateBoostCheckoutRequest" }
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateBoostCheckoutResponse" }
        "400": { description: Feature disabled or invalid input }
        "403": { description: Not allowed }
        "404": { description: Candidate not found }

  /cv/checkout/verify:
    post:
      operationId: verifyCvCheckout
      tags: [cv]
      summary: Verify a Stripe Checkout Session and unlock the AI CV Builder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerifyBoostCheckoutRequest" }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyCvCheckoutResponse" }
        "400": { description: Invalid input }
        "404": { description: Session not found }

  /candidates/{id}/cv:
    get:
      operationId: getCandidateCv
      tags: [cv, candidates]
      summary: Read the latest AI-generated CV for this candidate
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: CV state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateCvResponse" }
        "403": { description: Not allowed }
        "404": { description: Candidate not found }

  /candidates/{id}/cv/generate:
    post:
      operationId: generateCandidateCv
      tags: [cv, candidates]
      summary: Generate a new AI CV for this candidate (requires unlock)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GenerateCvRequest" }
      responses:
        "200":
          description: Generated CV
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateCvResponse" }
        "402": { description: AI CV Builder not unlocked }
        "403": { description: Not allowed }
        "404": { description: Candidate not found }

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List staff visible to the current user
      responses:
        "200":
          description: Staff members
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StaffListResponse" }
        "403": { description: Organization member access required }

  /staff/invite:
    post:
      operationId: inviteStaff
      tags: [staff]
      summary: Invite a teammate to the current org (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InviteStaffRequest" }
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteStaffResponse" }
        "400": { description: Invalid input }
        "403": { description: Owner access required }
        "409": { description: Email already in use }

  /staff/{id}:
    delete:
      operationId: removeStaff
      tags: [staff]
      summary: Remove a teammate (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "400": { description: Invalid input }
        "403": { description: Owner access required }
        "404": { description: Member not found }

  /staff/{id}/role:
    patch:
      operationId: updateStaffRole
      tags: [staff]
      summary: Change a teammate's org role (owner / super_admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateStaffRoleRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StaffMemberResponse" }
        "400": { description: Invalid input }
        "403": { description: Owner access required }
        "404": { description: Member not found }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    AuthUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [candidate, employer, institution, admin]
        status:
          type: string
          enum: [pending, active, rejected, invited]
        orgRole: { type: string, nullable: true }
        candidateId: { type: integer, nullable: true }
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
        avatarUrl:
          type: string
          nullable: true
          description: Normalized object storage path (e.g. /objects/uploads/<id>) for the user's avatar image.
        phone: { type: string, nullable: true }
        title: { type: string, nullable: true, description: "Job title within the user's organization (free text)." }
        bio: { type: string, nullable: true }
        permissions:
          type: array
          items: { type: string }
          description: Effective admin permission keys; empty for non-admins.
      required:
        [id, email, fullName, role, status, orgRole, candidateId, employerId, institutionId, avatarUrl, phone, title, bio, permissions]

    ProfileUpdateRequest:
      type: object
      description: |
        Universal personal-profile update. All fields are optional; only the
        fields supplied are written. Pass null on a nullable field to clear it.
      properties:
        fullName: { type: string, minLength: 1, maxLength: 200 }
        phone: { type: string, nullable: true, maxLength: 50 }
        title: { type: string, nullable: true, maxLength: 200 }
        bio: { type: string, nullable: true, maxLength: 2000 }
        avatarUrl:
          type: string
          nullable: true
          description: Normalized object path returned by the upload endpoint, or null to remove the avatar.

    UploadUrlRequest:
      type: object
      properties:
        name: { type: string }
        size: { type: integer }
        contentType: { type: string }
      required: [name, size, contentType]

    UploadUrlResponseMetadata:
      type: object
      properties:
        name: { type: string }
        size: { type: integer }
        contentType: { type: string }
      required: [name, size, contentType]

    UploadUrlResponse:
      type: object
      properties:
        uploadURL: { type: string, description: "Presigned PUT URL the client uploads the file to." }
        objectPath: { type: string, description: "Normalized object path (e.g. /objects/uploads/<id>) to persist as a reference." }
        metadata: { $ref: "#/components/schemas/UploadUrlResponseMetadata" }
      required: [uploadURL, objectPath, metadata]

    AuthSession:
      type: object
      properties:
        user:
          oneOf:
            - { $ref: "#/components/schemas/AuthUser" }
            - { type: "null" }
        sessionToken:
          type: string
          description: |
            Signed session token returned by `/auth/login`.  Web clients
            running in cookie-restricted contexts (nested iframe previews,
            third-party-cookie-blocked browsers) should persist this and
            replay it via `Authorization: Bearer <token>` on every API
            request.  Other clients can ignore it: the normal session
            cookie is always set in parallel.
      required: [user]

    RegisterRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [candidate, employer, institution]
        submittedData:
          type: object
          additionalProperties: true
      required: [email, password, fullName, role]

    RegisterResponse:
      type: object
      properties:
        message: { type: string }
      required: [message]

    LoginRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    SetupPasswordRequest:
      type: object
      properties:
        token: { type: string }
        password: { type: string }
      required: [token, password]

    ForgotPasswordRequest:
      type: object
      properties:
        email: { type: string }
      required: [email]

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }
      required: [currentPassword, newPassword]

    SetupTokenInfo:
      type: object
      properties:
        email: { type: string }
        fullName: { type: string }
        role: { type: string }
      required: [email, fullName, role]

    Registration:
      type: object
      properties:
        registrationId: { type: integer }
        userId: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role: { type: string }
        userStatus: { type: string }
        registrationCreatedAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time, nullable: true }
        decisionNote: { type: string, nullable: true }
        candidateId: { type: integer, nullable: true }
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
        submittedData:
          type: object
          additionalProperties: true
      required: [registrationId, userId, email, fullName, role, userStatus, registrationCreatedAt, submittedData]

    OnboardRequest:
      type: object
      properties:
        role:
          type: string
          enum: [employer, institution]
        email: { type: string }
        fullName: { type: string }
        entity:
          type: object
          additionalProperties: true
      required: [role, email, fullName, entity]

    OnboardResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id: { type: integer }
            email: { type: string }
            fullName: { type: string }
            role: { type: string }
          required: [id, email, fullName, role]
        setupUrl:
          type: string
          nullable: true
          description: One-time password setup URL. Only returned when emailSent is false (no email provider configured); otherwise null so the link cannot leak via the admin UI.
        expiresAt: { type: string, format: date-time }
        emailSent:
          type: boolean
          description: True if the setup link was delivered by the email provider; false if email is not configured.
      required: [user, expiresAt, emailSent]

    OnboardedUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
      required: [id, email, fullName, role, status, createdAt]

    RegistrationDecisionBody:
      type: object
      properties:
        note: { type: string }

    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    SetEmployerVerifiedRequest:
      type: object
      properties:
        verified: { type: boolean }
      required: [verified]

    SetEmployerVerifiedResponse:
      type: object
      properties:
        ok: { type: boolean }
        verified: { type: boolean }
      required: [ok, verified]

    AdminApplicationListResponse:
      type: object
      properties:
        applications:
          type: array
          items: { $ref: "#/components/schemas/Application" }
      required: [applications]

    HiresAnalyticsPoint:
      type: object
      properties:
        periodStart: { type: string, format: date-time }
        label: { type: string }
        count: { type: integer }
      required: [periodStart, label, count]

    HiresAnalyticsResponse:
      type: object
      properties:
        bucket:
          type: string
          enum: [day, week, month, year]
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        total: { type: integer }
        points:
          type: array
          items: { $ref: "#/components/schemas/HiresAnalyticsPoint" }
      required: [bucket, from, to, total, points]

    AdminAccount:
      type: object
      properties:
        userId: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [candidate, employer, institution, admin]
        status:
          type: string
          enum: [pending, active, rejected, invited, disabled]
        candidateId: { type: integer, nullable: true }
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
      required:
        - userId
        - email
        - fullName
        - role
        - status
        - candidateId
        - employerId
        - institutionId
        - createdAt

    AdminAccountsResponse:
      type: object
      properties:
        accounts:
          type: array
          items: { $ref: "#/components/schemas/AdminAccount" }
      required: [accounts]

    AdminUserStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, disabled]

    InstitutionAnalyticsRow:
      type: object
      properties:
        institutionId: { type: integer }
        institutionName: { type: string }
        location: { type: string }
        candidateCount: { type: integer }
        hiredCount: { type: integer }
        applicationCount: { type: integer }
      required:
        - institutionId
        - institutionName
        - location
        - candidateCount
        - hiredCount
        - applicationCount

    InstitutionAnalyticsResponse:
      type: object
      properties:
        totalCandidates: { type: integer }
        totalHires: { type: integer }
        rows:
          type: array
          items: { $ref: "#/components/schemas/InstitutionAnalyticsRow" }
      required: [totalCandidates, totalHires, rows]

    EmployerAnalyticsRow:
      type: object
      properties:
        employerId: { type: integer }
        employerName: { type: string }
        industry: { type: string }
        jobsCount: { type: integer }
        applicationsCount: { type: integer }
        hiresCount: { type: integer }
        uniqueCandidatesHired: { type: integer }
      required:
        - employerId
        - employerName
        - industry
        - jobsCount
        - applicationsCount
        - hiresCount
        - uniqueCandidatesHired

    EmployerAnalyticsResponse:
      type: object
      properties:
        totalEmployers: { type: integer }
        totalHires: { type: integer }
        rows:
          type: array
          items: { $ref: "#/components/schemas/EmployerAnalyticsRow" }
      required: [totalEmployers, totalHires, rows]

    VerifyStudentResponse:
      type: object
      properties:
        ok: { type: boolean }
        verifiedAt: { type: string, format: date-time }
      required: [ok, verifiedAt]

    Skill:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: string }
      required: [id, name, category]

    Candidate:
      type: object
      properties:
        id: { type: integer }
        fullName: { type: string }
        headline: { type: string }
        bio: { type: string }
        location: { type: string }
        avatarUrl: { type: string }
        email: { type: string }
        phone: { type: string }
        portfolioUrl: { type: string, nullable: true }
        videoIntroUrl: { type: string, nullable: true }
        availability:
          type: string
          enum: [open, employed, not_looking]
        yearsExperience: { type: integer }
        talentScore: { type: integer }
        isBoosted: { type: boolean }
        boostExpiresAt:
          type: string
          format: date-time
          nullable: true
          description: When the active boost expires. Null when not boosted.
        institutionId: { type: integer, nullable: true }
        institutionName: { type: string, nullable: true }
        institutions:
          type: array
          description: All institutions this candidate is affiliated with (primary first).
          items:
            $ref: "#/components/schemas/CandidateInstitutionLink"
        skills:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
      required:
        - id
        - fullName
        - headline
        - bio
        - location
        - avatarUrl
        - email
        - phone
        - availability
        - yearsExperience
        - talentScore
        - isBoosted
        - institutions
        - skills
        - createdAt

    CandidateInstitutionLink:
      type: object
      properties:
        id: { type: integer, description: "Institution id" }
        name: { type: string }
        type: { type: string }
        logoUrl: { type: string }
        isPrimary: { type: boolean }
        isVerified:
          type: boolean
          description: True if this institution has explicitly verified the candidate as a real student.
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        departmentId:
          type: integer
          nullable: true
          description: Department/program/faculty within this institution. Null when unassigned.
        departmentName:
          type: string
          nullable: true
          description: Resolved department/program name. Null when unassigned.
      required: [id, name, type, logoUrl, isPrimary, isVerified]

    CandidateDetail:
      allOf:
        - $ref: "#/components/schemas/Candidate"
        - type: object
          properties:
            education:
              type: array
              items: { $ref: "#/components/schemas/EducationEntry" }
            experience:
              type: array
              items: { $ref: "#/components/schemas/ExperienceEntry" }
            certifications:
              type: array
              items: { $ref: "#/components/schemas/Certification" }
            badges:
              type: array
              items: { $ref: "#/components/schemas/Badge" }
          required: [education, experience, certifications, badges]

    EducationEntry:
      type: object
      properties:
        id: { type: integer }
        institution: { type: string }
        degree: { type: string }
        fieldOfStudy: { type: string }
        startYear: { type: integer }
        endYear: { type: integer, nullable: true }
      required: [id, institution, degree, fieldOfStudy, startYear]

    EducationEntryInput:
      type: object
      description: |
        Input shape for replacing a candidate's self-reported education
        entries via PATCH /candidates/{id}. The id field is omitted; the
        server replaces all entries.
      properties:
        institution: { type: string, minLength: 1, maxLength: 200 }
        degree: { type: string, minLength: 1, maxLength: 200 }
        fieldOfStudy: { type: string, minLength: 1, maxLength: 200 }
        startYear: { type: integer, minimum: 1900, maximum: 2100 }
        endYear: { type: integer, minimum: 1900, maximum: 2100, nullable: true }
      required: [institution, degree, fieldOfStudy, startYear]

    ExperienceEntry:
      type: object
      properties:
        id: { type: integer }
        # employerId links the entry to an Employer record on the platform
        # so we can show the company logo and let viewers click through to
        # the employer page. Null when the candidate typed the company by
        # hand (free text in `company`).
        employerId: { type: integer, nullable: true }
        # employerLogoUrl is denormalized into the response so candidate
        # detail pages can render the LinkedIn-style company tile without
        # a separate fetch per entry.
        employerLogoUrl: { type: string, nullable: true }
        company: { type: string }
        title: { type: string }
        employmentType:
          type: string
          nullable: true
          enum:
            [
              full_time,
              part_time,
              self_employed,
              freelance,
              contract,
              internship,
              apprenticeship,
              seasonal,
            ]
        location: { type: string, nullable: true }
        locationType:
          type: string
          nullable: true
          enum: [on_site, hybrid, remote]
        description: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date, nullable: true }
      required: [id, company, title, description, startDate]

    ExperienceEntryInput:
      type: object
      description: |
        Input shape for replacing a candidate's work experience entries
        via PATCH /candidates/{id}. The id field is omitted; the server
        replaces all entries atomically. Either pick an employer from the
        platform via `employerId` (the server snapshots the employer's
        name into `company`) or pass a free-text `company` for off-platform
        roles. A null `endDate` means "currently working here".
      properties:
        employerId: { type: integer, nullable: true }
        company: { type: string, minLength: 1, maxLength: 200 }
        title: { type: string, minLength: 1, maxLength: 200 }
        employmentType:
          type: string
          nullable: true
          enum:
            [
              full_time,
              part_time,
              self_employed,
              freelance,
              contract,
              internship,
              apprenticeship,
              seasonal,
            ]
        location: { type: string, nullable: true, maxLength: 200 }
        locationType:
          type: string
          nullable: true
          enum: [on_site, hybrid, remote]
        description: { type: string, maxLength: 4000 }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date, nullable: true }
      required: [title, startDate]

    Certification:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        issuer: { type: string }
        issuedAt: { type: string, format: date }
      required: [id, name, issuer, issuedAt]

    Badge:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        tier:
          type: string
          enum: [bronze, silver, gold, platinum]
      required: [id, name, description, tier]

    CreateCandidate:
      type: object
      properties:
        fullName: { type: string }
        headline: { type: string }
        bio: { type: string }
        location: { type: string }
        email: { type: string }
        phone: { type: string }
        avatarUrl: { type: string }
        yearsExperience: { type: integer }
        institutionId: { type: integer, nullable: true }
        skills:
          type: array
          items: { type: string }
        availability:
          type: string
          enum: [open, employed, not_looking]
      required:
        - fullName
        - headline
        - bio
        - location
        - email
        - phone
        - yearsExperience
        - skills
        - availability

    UpdateCandidate:
      type: object
      properties:
        fullName: { type: string }
        headline: { type: string }
        bio: { type: string }
        location: { type: string }
        email: { type: string }
        phone: { type: string }
        avatarUrl: { type: string }
        yearsExperience: { type: integer }
        institutionId:
          type: integer
          nullable: true
          description: Sets the candidate's PRIMARY institution affiliation. Existing secondary affiliations are preserved.
        affiliations:
          type: array
          description: |
            Optional full replacement of the candidate's per-institution
            department assignments. When provided, every entry's
            departmentId is validated to belong to the same institution.
            Affiliations not listed here keep their current departmentId.
          items: { $ref: "#/components/schemas/CandidateAffiliationInput" }
        education:
          type: array
          description: |
            Optional full replacement of the candidate's self-reported
            education entries. When provided, the existing entries are
            deleted and replaced with this list. Omit the field to leave
            entries untouched. Pass an empty array to clear all entries.
          items: { $ref: "#/components/schemas/EducationEntryInput" }
        experience:
          type: array
          description: |
            Optional full replacement of the candidate's self-reported
            work experience entries (LinkedIn-style). When provided, the
            existing entries are deleted and replaced with this list.
            Omit the field to leave entries untouched. Pass an empty
            array to clear all entries.
          items: { $ref: "#/components/schemas/ExperienceEntryInput" }
        skills:
          type: array
          items: { type: string }
        availability:
          type: string
          enum: [open, employed, not_looking]
        isBoosted: { type: boolean }

    CandidateAffiliationInput:
      type: object
      properties:
        institutionId: { type: integer }
        departmentId:
          type: integer
          nullable: true
          description: Department/program/faculty within `institutionId`. Null clears the assignment.
      required: [institutionId]

    Employer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        tagline: { type: string }
        description: { type: string }
        industry: { type: string }
        location: { type: string }
        logoUrl: { type: string }
        coverUrl: { type: string }
        websiteUrl: { type: string }
        size:
          type: string
          enum: [startup, small, midsize, large, enterprise]
        verified: { type: boolean }
        openJobs: { type: integer }
        createdAt: { type: string, format: date-time }
        accountManagerId:
          type: integer
          nullable: true
          description: Owning account-manager admin user id (admin-only field)
        accountManagerName:
          type: string
          nullable: true
          description: Owning account-manager display name (admin-only field)
      required:
        - id
        - name
        - tagline
        - description
        - industry
        - location
        - logoUrl
        - coverUrl
        - websiteUrl
        - size
        - verified
        - openJobs
        - createdAt

    EmployerDetail:
      allOf:
        - $ref: "#/components/schemas/Employer"
        - type: object
          properties:
            jobs:
              type: array
              items: { $ref: "#/components/schemas/Job" }
          required: [jobs]

    CreateEmployer:
      type: object
      properties:
        name: { type: string }
        tagline: { type: string }
        description: { type: string }
        industry: { type: string }
        location: { type: string }
