        "404": { description: Application not found }
        "409": { description: Application is already endorsed }
    delete:
      operationId: unendorseApplication
      tags: [applications]
      summary: Remove an existing endorsement (owner/registrar or the original endorser).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Endorsement removed }
        "403": { description: Not allowed }
        "404": { description: Endorsement not found }

  /institutions/{id}/analytics/placement:
    get:
