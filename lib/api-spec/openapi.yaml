          name: candidateId
          schema: { type: integer }
        - in: query
          name: jobId
          schema: { type: integer }
        - in: query
          name: employerId
          schema: { type: integer }
        - in: query
          name: status
          schema:
            type: string
            enum: [applied, screening, interview, offer, hired, rejected, withdrawn]
        - in: query
          name: limit
          description: Page size (max 50, default 20).
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: cursor
          description: Opaque cursor from previous `X-Next-Cursor` header.
          schema: { type: string }
      responses:
        "200":
          description: Applications
          headers:
            X-Next-Cursor:
              description: Pass back as `?cursor=` to fetch the next page.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Application" }
