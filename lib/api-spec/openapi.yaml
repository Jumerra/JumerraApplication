        - jobId
        - jobTitle
        - employerId
        - employerName
        - candidateId
        - candidateName
        - status
        - location
        - meetingLink
        - notes
        - declineReason
        - selectedSlotId
        - respondedAt
        - createdAt
        - updatedAt
        - timeSlots

    CreateInterviewInviteSlot:
      type: object
      properties:
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
      required: [startsAt, endsAt]

    CreateInterviewInviteRequest:
      type: object
      properties:
        location: { type: string }
        meetingLink: { type: string }
        notes: { type: string }
        slots:
          type: array
          minItems: 1
          maxItems: 5
          items: { $ref: "#/components/schemas/CreateInterviewInviteSlot" }
      required: [slots]

    AcceptInterviewInviteRequest:
      type: object
