        scope (owner/registrar = org-wide; dean = faculty; HoD =
        department) that are still awaiting an endorsement.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Pending endorsements
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PendingEndorsementApplication" }
        "403": { description: Not allowed }

  /applications/{id}/endorse:
    post:
      operationId: endorseApplication
      tags: [applications]
      summary: Endorse an application as institution staff (co-sign).
      parameters:
        - in: path
