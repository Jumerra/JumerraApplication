        - talentScore
        - matchScore
        - matchedSkills
        - matchBreakdown

    EmployerSubscriptionLegacyStatus:
      type: object
      properties:
        hasLegacySubscription: { type: boolean }
        migratedAt: { type: string, format: date-time, nullable: true }
        currentPeriodEnd: { type: string, format: date-time, nullable: true }
      required: [hasLegacySubscription, migratedAt, currentPeriodEnd]

    MigrateLegacyEmployerSubscriptionsResponse:
      type: object
      properties:
        scanned: { type: integer }
        cancelled: { type: integer }
        skipped: { type: integer }
        failed: { type: integer }
      required: [scanned, cancelled, skipped, failed]

    JobMatch:
      type: object
      properties:
        jobId: { type: integer }
        title: { type: string }
        employerName: { type: string }
        employerLogoUrl: { type: string }
        location: { type: string }
        type:
          type: string
          enum: [internship, part_time, full_time, contract, remote]
        salaryMin: { type: integer, nullable: true }
        salaryMax: { type: integer, nullable: true }
        currency: { type: string }
        matchScore: { type: integer }
        matchedSkills:
          type: array
          items: { type: string }
        matchBreakdown: { $ref: "#/components/schemas/MatchBreakdown" }
        tier:
          type: string
          enum: [free, promoted, sponsored]
        tierExpiresAt: { type: string, format: date-time, nullable: true }
        fastTrack:
          type: boolean
          description: True when the owning employer has the 48-hour Fast-Track pledge enabled.
      required:
        - jobId
        - title
        - employerName
        - employerLogoUrl
        - location
        - type
        - currency
        - matchScore
        - matchedSkills
        - matchBreakdown
        - fastTrack

    MatchBreakdown:
      type: object
      description: |
        Transparent breakdown of why a candidate scored a particular
        match against a job (or vice versa). The score is a weighted
        sum: skills 65%, experience 15%, talent 20%. The "Pct" fields
        are 0-100 raw component scores; the "Contribution" fields are
        each component's already-weighted contribution to the final
        score (so they sum to roughly the displayed match score).
      properties:
        skillCoveragePct: { type: integer }
        experiencePct: { type: integer }
        talentPct: { type: integer }
        skillContribution: { type: integer }
        experienceContribution: { type: integer }
        talentContribution: { type: integer }
        matchedSkills:
          type: array
          items: { type: string }
        missingSkills:
          type: array
          items: { type: string }
        summary: { type: string }
      required:
        - skillCoveragePct
        - experiencePct
        - talentPct
        - skillContribution
        - experienceContribution
        - talentContribution
        - matchedSkills
        - missingSkills
        - summary

    PlatformStats:
      type: object
      properties:
        totalCandidates: { type: integer }
        totalEmployers: { type: integer }
        totalInstitutions: { type: integer }
        totalJobs: { type: integer }
        totalApplications: { type: integer }
        totalHires: { type: integer }
        applicationsByStatus:
          type: array
          items:
            type: object
            properties:
              status: { type: string }
              count: { type: integer }
            required: [status, count]
        jobsByType:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              count: { type: integer }
            required: [type, count]
        signupsTrend:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              candidates: { type: integer }
              employers: { type: integer }
            required: [date, candidates, employers]
      required:
        - totalCandidates
        - totalEmployers
        - totalInstitutions
        - totalJobs
        - totalApplications
        - totalHires
        - applicationsByStatus
        - jobsByType
        - signupsTrend

    EmployerDashboard:
      type: object
      properties:
        employerId: { type: integer }
        employerName: { type: string }
        openJobs: { type: integer }
        totalApplications: { type: integer }
        interviewsScheduled: { type: integer }
        hires: { type: integer }
        averageMatchScore: { type: integer }
        pipelineByStage:
          type: array
          items:
            type: object
            properties:
              status: { type: string }
              count: { type: integer }
