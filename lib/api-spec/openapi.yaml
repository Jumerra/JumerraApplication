  /dashboard/salary-insights:
    get:
      operationId: getSalaryInsights
      tags: [dashboard]
      summary: Average salary by role/skill
      responses:
        "200":
          description: Salary insights
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SalaryInsight" }

  /salary-insights:
    get:
      operationId: getSalaryBand
      tags: [dashboard]
      summary: Anonymous salary band derived from real hires
      description: |
        Returns a percentile band (p25/p50/p75) of self-reported
        salaries from candidates HIRED into the same role as `jobId`.
        Optional `institutionId` filters to candidates affiliated with
        a specific school for the "candidates from your school in this
        role earned X–Y" surface. A 3-hire minimum protects privacy;
        when the cohort is smaller, the response carries
        `insufficient: true` with no percentile values.
      parameters:
        - in: query
          name: jobId
          required: false
          schema: { type: integer }
          description: |
            Anchor by an existing job (preferred). Either `jobId` or
            `title` must be supplied.
        - in: query
          name: title
          required: false
          schema: { type: string }
          description: |
            Alternative anchor — used by the employer post screen to
            preview a band BEFORE the job exists. Matched
            case-insensitively against existing job titles.
        - in: query
          name: currency
          required: false
          schema: { type: string }
          description: Used with `title` to pick the currency bucket.
        - in: query
          name: institutionId
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Salary band
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SalaryBand" }
        "400": { description: Missing both jobId and title }
        "404": { description: Job not found }

  /applications/{id}/report-salary:
    post:
      operationId: reportApplicationSalary
      tags: [applications]
      summary: Candidate self-reports an anonymous accepted salary
      description: |
        Only the candidate on the application may call this, and only
        once the application has reached `hired`. The value feeds the
        aggregate band returned by /salary-insights and is never echoed
        per-row to other viewers.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReportSalary" }
      responses:
        "200":
          description: Reported
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]
        "403": { description: Not allowed }
        "404": { description: Not found }
        "409": { description: Application is not hired }

