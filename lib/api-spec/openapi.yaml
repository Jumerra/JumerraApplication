    StaffMember:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [employer, institution, admin]
        orgRole: { type: string, nullable: true }
        status:
          type: string
          enum: [pending, active, rejected, invited]
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
        assignedDepartmentId:
          type: integer
          nullable: true
          description: |
            Optional department/program scope for non-owner institution
            staff (e.g. Head of Department). Null means org-wide.
            Owners/registrars always operate org-wide and ignore this field.
        assignedDepartmentName:
          type: string
          nullable: true
          description: Resolved name of the assigned department/program. Null when org-wide.
        assignedFacultyId:
          type: integer
          nullable: true
          description: |
            Optional faculty scope for institution staff (typically Deans).
            When set, the user can see all departments under that faculty.
            Null means no faculty scope. Ignored for owner / registrar roles.
        assignedFacultyName:
          type: string
          nullable: true
          description: Resolved name of the assigned faculty. Null when not faculty-scoped.
        createdAt: { type: string, format: date-time }
      required: [id, email, fullName, role, orgRole, status, employerId, institutionId, createdAt]

    StaffListResponse:
      type: object
      properties:
        members:
          type: array
          items: { $ref: "#/components/schemas/StaffMember" }
      required: [members]

    InviteStaffRequest:
      type: object
      properties:
        email: { type: string }
        fullName: { type: string }
        orgRole: { type: string }
        assignedDepartmentId:
          type: integer
          nullable: true
          description: |
            Optional department/program scope (institution staff only,
            non-owner roles). Required for `hod` (head of department).
            Must reference a department of the inviter's institution.
            Ignored for owner / registrar roles and for non-institution orgs.
        assignedFacultyId:
          type: integer
          nullable: true
          description: |
            Optional faculty scope (institution staff only). Required for
            `dean`. Must reference a faculty of the inviter's institution.
            Ignored for owner / registrar roles.
      required: [email, fullName, orgRole]

    InviteStaffResponse:
      type: object
      properties:
        member: { $ref: "#/components/schemas/StaffMember" }
        setupUrl:
          type: string
          nullable: true
          description: One-time password setup URL. Only returned when emailSent is false (no email provider configured); otherwise null so the inviter cannot read someone else's token.
        expiresAt: { type: string, format: date-time }
        emailSent:
          type: boolean
          description: True if the setup link was delivered by the email provider; false if email is not configured.
      required: [member, expiresAt, emailSent]

    UpdateStaffRoleRequest:
      type: object
      properties:
        orgRole: { type: string }
        assignedDepartmentId:
          type: integer
          nullable: true
          description: |
            Optional department/program scope (institution staff only).
            Required for `hod`. Set to null to clear and grant org-wide
            access. Omit to leave the existing scope unchanged. Ignored
            for owner / registrar roles and for non-institution orgs.
        assignedFacultyId:
          type: integer
          nullable: true
          description: |
            Optional faculty scope. Required for `dean`. Set to null to
            clear. Omit to leave unchanged. Ignored for owner / registrar
            roles.
      required: [orgRole]

