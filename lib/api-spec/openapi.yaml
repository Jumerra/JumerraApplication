      required: [key, label, rawStatus, reachedAt, isReached, isCurrent]

    ApplicationTimeline:
      type: object
      properties:
        applicationId: { type: integer }
        currentStatus: { type: string }
        currentMilestone:
          type: string
          enum: [submitted, reviewed, shortlisted, interview, decision, withdrawn]
        milestones:
          type: array
          items: { $ref: "#/components/schemas/ApplicationTimelineMilestone" }
        etaDays:
          type: integer
          nullable: true
          description: Data-derived median days employers take to move past the current step across the whole platform's status history (null if not enough signal yet).
        etaSource:
          type: string
          enum: [data, fallback, none]
          description: "`data` = computed from real status_history medians; `fallback` = bootstrap heuristic used until enough history exists; `none` = terminal/closed."
        etaSampleSize:
          type: integer
          description: Number of historical transitions backing the etaDays median.
        etaLabel: { type: string }
        endorsement:
          nullable: true
          $ref: "#/components/schemas/ApplicationTimelineEndorsement"
      required: [applicationId, currentStatus, currentMilestone, milestones, etaSource, etaSampleSize, etaLabel, endorsement]

    ApplicationTimelineEndorsement:
      type: object
      description: |
        Surfaced on the candidate-facing timeline when their institution
        has co-signed the application. Rendered as a "Verified by
        [Institution]" milestone event between status milestones.
      properties:
        institutionId: { type: integer }
        institutionName: { type: string }
        note: { type: string, nullable: true }
        endorsedAt: { type: string, format: date-time }
      required: [institutionId, institutionName, note, endorsedAt]

    SavedSearch:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        searchText: { type: string, nullable: true }
        jobType: { type: string, nullable: true }
        sortBy: { type: string, nullable: true }
        filters:
          type: object
          additionalProperties: true
          description: "Full saved query state (filters + sort) — opaque to the server, replayed by the client to restore the saved view."
        emailAlerts: { type: boolean }
        inAppAlerts: { type: boolean }
        alertsEnabled:
          type: boolean
          description: "Legacy mirror, true when either email or in-app alerts are on."
        createdAt: { type: string, format: date-time }
        lastAlertedAt: { type: string, format: date-time, nullable: true }
        newMatchCount: { type: integer, description: "Jobs newer than lastSeen still matching the filters." }
      required: [id, name, searchText, jobType, sortBy, filters, emailAlerts, inAppAlerts, alertsEnabled, createdAt, lastAlertedAt, newMatchCount]

    CreateSavedSearch:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        searchText: { type: string, nullable: true }
        jobType:
          type: string
          nullable: true
          enum: [full_time, part_time, internship, contract, remote]
        sortBy: { type: string, nullable: true }
        filters:
          type: object
          additionalProperties: true
        emailAlerts: { type: boolean, default: true }
        inAppAlerts: { type: boolean, default: true }
      required: [name]

    UpdateSavedSearch:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        emailAlerts: { type: boolean }
        inAppAlerts: { type: boolean }
        sortBy: { type: string, nullable: true }
        filters:
          type: object
          additionalProperties: true
        markSeen: { type: boolean, description: "Reset lastSeenJobId to current max." }


    TalentPool:
      type: object
      properties:
        id: { type: integer }
        employerId: { type: integer }
        name: { type: string }
        description: { type: string }
        memberCount: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, employerId, name, description, memberCount, createdAt]

    TalentPoolMember:
      type: object
      properties:
        candidateId: { type: integer }
        candidateName: { type: string }
        candidateAvatarUrl: { type: string }
        headline: { type: string }
        location: { type: string }
        talentScore: { type: integer }
        openToOffers: { type: boolean }
        tags:
          type: array
          items: { type: string }
        addedAt: { type: string, format: date-time }
      required:
        - candidateId
        - candidateName
        - candidateAvatarUrl
        - headline
        - location
        - talentScore
        - openToOffers
        - tags
        - addedAt

    TalentPoolDetail:
      allOf:
        - $ref: "#/components/schemas/TalentPool"
        - type: object
          properties:
            members:
              type: array
              items: { $ref: "#/components/schemas/TalentPoolMember" }
          required: [members]

    CreateTalentPoolRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        description: { type: string, maxLength: 500 }
      required: [name]

    AddTalentPoolMembersRequest:
      type: object
      properties:
        candidateIds:
          type: array
          items: { type: integer }
          minItems: 1
          maxItems: 200
        tags:
          type: array
          description: Optional tags applied to every newly-added candidate.
          items: { type: string, minLength: 1, maxLength: 40 }
      required: [candidateIds]

    MessageTemplate:
      type: object
      properties:
        id: { type: integer }
        employerId: { type: integer }
        name: { type: string }
        subject: { type: string }
        body: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, employerId, name, subject, body, createdAt]

    CreateMessageTemplateRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        subject: { type: string, maxLength: 200 }
        body: { type: string, minLength: 1, maxLength: 4000 }
      required: [name, body]

    SendOutreachRequest:
      type: object
      description: |
        Either `templateId` or (`subject` + `body`) must be provided.
        Recipients are specified directly via `candidateIds` or by
        passing a `poolId` (sends to every member of that pool).
      properties:
        candidateIds:
          type: array
          items: { type: integer }
          maxItems: 200
        poolId: { type: integer }
        templateId: { type: integer }
        subject: { type: string, maxLength: 200 }
        body: { type: string, maxLength: 4000 }
        jobId:
          type: integer
          description: Optional — used to expand `{{jobTitle}}`. Must belong to the employer.

    SendOutreachResponse:
      type: object
      properties:
        sent: { type: integer }
        skipped: { type: integer }
        remainingToday: { type: integer }
      required: [sent, skipped, remainingToday]

    InstitutionTopEmployer:
      type: object
      properties:
        employerId: { type: integer }
        employerName: { type: string }
        employerLogoUrl: { type: string }
        hires: { type: integer }
      required: [employerId, employerName, employerLogoUrl, hires]

    InstitutionSalaryByDepartment:
      type: object
      properties:
        departmentId: { type: integer, nullable: true }
        departmentName: { type: string }
        medianSalary: { type: integer }
        hires: { type: integer }
      required: [departmentId, departmentName, medianSalary, hires]

    InstitutionPlacementAnalytics:
      type: object
      properties:
        institutionId: { type: integer }
        totalStudents: { type: integer }
        placedStudents: { type: integer }
        placementRate: { type: number, format: float }
        medianTimeToFirstJobDays: { type: integer }
        topEmployers:
          type: array
          items: { $ref: "#/components/schemas/InstitutionTopEmployer" }
        salaryMediansByDepartment:
          type: array
          items: { $ref: "#/components/schemas/InstitutionSalaryByDepartment" }
        placementsLocked:
          type: boolean
          description: True when the institution does not have an active premium subscription; analytics are zeroed out in that case.
        endorsementsThisYear:
          type: integer
          description: |
            Number of applications endorsed (co-signed) by this
            institution in the current academic year. Counts every
            endorsed application by a student in the caller's scope,
            regardless of hire outcome.
      required:
        - institutionId
        - totalStudents
        - placedStudents
        - placementRate
        - medianTimeToFirstJobDays
        - topEmployers
        - salaryMediansByDepartment
        - placementsLocked
        - endorsementsThisYear

    InstitutionCohortLeaderboard:
      type: object
      properties:
        institutionId: { type: integer }
        institutionName: { type: string }
        institutionLogoUrl: { type: string }
        institutionLocation: { type: string }
        institutionType: { type: string }
        totalPlaced: { type: integer, description: Total verified students hired in the selected scope. }
        totalTracked: { type: integer, description: Total verified students in the selected scope. }
        medianTimeToPlacementDays:
          type: integer
          description: Median days from candidate signup to first hire across the scope.
        year:
          type: integer
          nullable: true
          description: Selected cohort year, or null when aggregating all cohorts.
        departmentId:
          type: integer
          nullable: true
        cohorts:
          type: array
          description: Per-cohort drill-down rows (one per graduation year). Sorted by year DESC.
          items:
            type: object
            properties:
              year: { type: integer }
              totalStudents: { type: integer }
              placedStudents: { type: integer }
              medianTimeToPlacementDays: { type: integer }
            required: [year, totalStudents, placedStudents, medianTimeToPlacementDays]
        topEmployers:
          type: array
          description: Top 5 employers by first-hire count within the scope.
          items: { $ref: "#/components/schemas/InstitutionTopEmployer" }
        salaryBandsByRoleFamily:
          type: array
          description: Salary bands per role family (job title); only families with at least 3 hires are returned.
          items:
            type: object
            properties:
              roleFamily: { type: string }
              hires: { type: integer, minimum: 3 }
              currency: { type: string }
              p25: { type: integer }
              p50: { type: integer }
              p75: { type: integer }
            required: [roleFamily, hires, currency, p25, p50, p75]
        availableYears:
          type: array
          description: Cohort years available for drill-down.
          items: { type: integer }
        availableDepartments:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
            required: [id, name]
      required:
        - institutionId
        - institutionName
        - institutionLogoUrl
        - institutionLocation
        - institutionType
        - totalPlaced
        - totalTracked
        - medianTimeToPlacementDays
        - year
        - departmentId
        - cohorts
        - topEmployers
        - salaryBandsByRoleFamily
        - availableYears
        - availableDepartments

    InstitutionEmployersLeaderboard:
      type: object
      properties:
        year: { type: integer }
        employers:
          type: array
          items: { $ref: "#/components/schemas/InstitutionTopEmployer" }
      required: [year, employers]

    InstitutionCohort:
      type: object
      properties:
        id: { type: integer }
        institutionId: { type: integer }
        year: { type: integer }
        name: { type: string }
        memberCount: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, institutionId, year, name, memberCount, createdAt]

    CreateInstitutionCohortRequest:
      type: object
      properties:
        year: { type: integer, minimum: 1900, maximum: 2200 }
        name: { type: string, minLength: 1, maxLength: 120 }
      required: [year, name]

    AddCohortMembersRequest:
      type: object
      properties:
        candidateIds:
          type: array
          items: { type: integer }
          minItems: 1
      required: [candidateIds]

    AddCohortMembersResponse:
      type: object
      properties:
        added: { type: integer }
        skipped: { type: integer }
      required: [added, skipped]

    InstitutionCohortCurvePoint:
      type: object
      properties:
        month: { type: string, description: "YYYY-MM" }
        cumulativePlacements: { type: integer }
        cumulativeRate: { type: number, format: float }
      required: [month, cumulativePlacements, cumulativeRate]

    InstitutionCohortCurve:
      type: object
      properties:
        cohortId: { type: integer }
        cohortName: { type: string }
        cohortYear: { type: integer }
        totalMembers: { type: integer }
        placedMembers: { type: integer }
        points:
          type: array
          items: { $ref: "#/components/schemas/InstitutionCohortCurvePoint" }
        placementsLocked: { type: boolean }
      required:
        - cohortId
        - cohortName
        - cohortYear
        - totalMembers
        - placedMembers
        - points
        - placementsLocked

    MockInterviewBreakdown:
      type: object
      properties:
        technical: { type: integer }
        communication: { type: integer }
        culture: { type: integer }
      required: [technical, communication, culture]

    MockInterviewQuestion:
      type: object
      properties:
        id: { type: integer }
        text: { type: string }
        focus:
          type: string
          enum: [technical, communication, culture]
      required: [id, text, focus]

    MockInterviewTranscriptEntry:
      type: object
      properties:
        questionIndex: { type: integer }
        question: { type: string }
        answer: { type: string }
        focus:
          type: string
          enum: [technical, communication, culture]
          description: |
            Focus axis of the question this answer addressed. Persisted
            so finalise-time aggregation can weight per-axis scores by
            the question's intent.
        scores: { $ref: "#/components/schemas/MockInterviewBreakdown" }
        feedback: { type: string }
        answeredAt: { type: string, format: date-time }
      required:
        - questionIndex
        - question
        - answer
        - focus
        - scores
        - feedback
        - answeredAt

    MockInterview:
      type: object
      properties:
        id: { type: integer }
        candidateId: { type: integer }
        jobId: { type: integer }
        applicationId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [in_progress, finalised, abandoned]
        questions:
          type: array
          items: { $ref: "#/components/schemas/MockInterviewQuestion" }
        transcript:
          type: array
          items: { $ref: "#/components/schemas/MockInterviewTranscriptEntry" }
        scoreOverall:
          type: integer
          nullable: true
        scoreTechnical:
          type: integer
          nullable: true
        scoreCommunication:
          type: integer
          nullable: true
        scoreCulture:
          type: integer
          nullable: true
        summary:
          type: string
          nullable: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - candidateId
        - jobId
        - applicationId
        - status
        - questions
        - transcript
        - scoreOverall
        - scoreTechnical
        - scoreCommunication
        - scoreCulture
        - summary
        - createdAt
        - updatedAt
        - completedAt

    DailyDeckCandidate:
      type: object
      properties:
        id: { type: integer }
        fullName: { type: string }
        headline: { type: string, nullable: true }
        location: { type: string, nullable: true }
        avatarUrl: { type: string, nullable: true }
        bio: { type: string, nullable: true }
        skills:
          type: array
          items: { type: string }
        talentScore: { type: integer }
        yearsExperience: { type: integer }
        openToOffers: { type: boolean }
        verifiedByPremium:
          type: boolean
          description: |
            True when this candidate has at least one verified affiliation
            with an institution on an active Pro subscription. Drives the
            employer-side "Verified · Pro" ribbon on deck cards.
      required: [id, fullName, skills, talentScore, yearsExperience, openToOffers]

    DailyDeckItem:
      type: object
      properties:
        candidate: { $ref: "#/components/schemas/DailyDeckCandidate" }
        bestJobId: { type: integer, nullable: true }
        bestJobTitle: { type: string, nullable: true }
        matchScore: { type: integer }
        matchedSkills:
          type: array
          items: { type: string }
        missingSkills:
          type: array
          items: { type: string }
        summary: { type: string }
      required: [candidate, matchScore, matchedSkills, missingSkills, summary]

    DailyDeckResponse:
      type: object
      properties:
        deckDate: { type: string, description: "YYYY-MM-DD in the employer's local timezone" }
        openJobsCount: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/DailyDeckItem" }
      required: [deckDate, openJobsCount, items]

    DailyDeckShortlistBody:
      type: object
      properties:
        poolId: { type: integer, description: "Existing pool to add into; must belong to caller's employer." }
        jobId: { type: integer, description: "When set, routes into a per-role pool named after the job title." }
        poolName: { type: string, description: "Override the auto-derived pool name." }

    DailyDeckShortlistResponse:
      type: object
      properties:
        ok: { type: boolean }
        poolId: { type: integer }
      required: [ok, poolId]

    DailyDeckDismissBody:
      type: object
      properties:
        reason: { type: string, maxLength: 280 }
        jobId: { type: integer, nullable: true, description: "Scope dismissal to a specific job; null = employer-wide." }

    MockInterviewListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/MockInterview" }
      required: [items]

    StartMockInterviewBody:
      type: object
      properties:
        jobId: { type: integer }
      required: [jobId]

    AnswerMockInterviewBody:
      type: object
      properties:
        questionIndex: { type: integer }
        answer: { type: string, minLength: 5 }
      required: [questionIndex, answer]

    AnswerMockInterviewResponse:
      type: object
      properties:
        interview: { $ref: "#/components/schemas/MockInterview" }
        lastAnswer: { $ref: "#/components/schemas/MockInterviewTranscriptEntry" }
        done: { type: boolean }
      required: [interview, lastAnswer, done]
