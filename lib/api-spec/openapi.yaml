        reason: { type: string }

    CandidateMatch:
      type: object
      properties:
        candidateId: { type: integer }
        fullName: { type: string }
        avatarUrl: { type: string }
        headline: { type: string }
        location: { type: string }
        talentScore: { type: integer }
        matchScore: { type: integer }
        matchedSkills:
          type: array
          items: { type: string }
        matchBreakdown: { $ref: "#/components/schemas/MatchBreakdown" }
      required:
        - candidateId
        - fullName
