    InstitutionSubscriptionSettings:
      type: object
      properties:
        isActive: { type: boolean }
        priceCents: { type: integer, minimum: 50, maximum: 10000000 }
        currency: { type: string, description: "ISO 4217 lowercase, e.g. 'usd'" }
        intervalDays:
          type: integer
          description: "Billing cycle length. 30 = monthly, 365 = yearly."
          enum: [30, 365]
        trialDays:
          type: integer
          minimum: 0
          maximum: 365
          description: "Free trial length applied to every new subscription. 0 disables the trial."
      required: [isActive, priceCents, currency, intervalDays, trialDays]

    UpdateInstitutionSubscriptionSettingsRequest:
      type: object
      properties:
        isActive: { type: boolean }
        priceCents: { type: integer, minimum: 50, maximum: 10000000 }
        currency: { type: string }
        intervalDays: { type: integer, enum: [30, 365] }
        trialDays: { type: integer, minimum: 0, maximum: 365 }
      required: [isActive, priceCents, currency, intervalDays, trialDays]

    InstitutionSubscriptionStatus:
      type: object
      description: |
        Current subscription state for one institution. `status === 'none'`
        means no row exists (or only failed/expired/canceled rows exist) —
        the institution should see the subscribe CTA. `trialing` and
        `active` are the two states that unlock placements.
      properties:
        status:
          type: string
          enum: [none, pending, trialing, active, expired, canceled, failed]
        trialEndsAt:
          type: string
          format: date-time
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        priceCentsSnapshot:
          type: integer
          nullable: true
        currencySnapshot:
          type: string
          nullable: true
        intervalDaysSnapshot:
          type: integer
          nullable: true
          description: "Billing cycle snapshot. 30 = monthly, 365 = yearly."
        isInTrial: { type: boolean }
        unlocksPlacements:
          type: boolean
          description: |
            True iff the institution currently has access to premium
            features. Equivalent to status in (trialing, active) AND
            currentPeriodEnd is in the future. Despite the legacy name
            this flag now governs every Institution Pro feature, not
            just placements.
      required:
        - status
        - trialEndsAt
        - currentPeriodEnd
        - priceCentsSnapshot
        - currencySnapshot
        - intervalDaysSnapshot
        - isInTrial
        - unlocksPlacements

    EmployerSubscriptionSettings:
      type: object
      properties:
        isActive: { type: boolean }
        freeJobPostLimit:
          type: integer
          minimum: 0
          maximum: 1000
          description: "Number of jobs an employer can post for free before the paywall kicks in. 0 disables the free quota entirely."
        priceCents: { type: integer, minimum: 50, maximum: 10000000 }
        currency: { type: string, description: "ISO 4217 lowercase, e.g. 'usd'" }
        intervalDays:
          type: integer
          minimum: 1
          maximum: 365
          description: "Subscription billing interval in days (30 = monthly, 365 = yearly)."
        trialDays:
          type: integer
          minimum: 0
          maximum: 365
          description: "Free trial length applied to every new subscription. 0 disables the trial."
      required: [isActive, freeJobPostLimit, priceCents, currency, intervalDays, trialDays]

    UpdateEmployerSubscriptionSettingsRequest:
      type: object
      properties:
        isActive: { type: boolean }
        freeJobPostLimit: { type: integer, minimum: 0, maximum: 1000 }
        priceCents: { type: integer, minimum: 50, maximum: 10000000 }
        currency: { type: string }
        intervalDays: { type: integer, minimum: 1, maximum: 365 }
        trialDays: { type: integer, minimum: 0, maximum: 365 }
      required: [isActive, freeJobPostLimit, priceCents, currency, intervalDays, trialDays]

    EmployerSubscriptionStatus:
      type: object
      description: |
        Combined view of an employer's subscription state and their
        free-quota usage. `canPostJob` is what the UI should consult
        before showing the post-job CTA — it is true when the feature
        is disabled, when the employer is under the free quota, or when
        they have a trialing/active subscription.
      properties:
        status:
          type: string
          enum: [none, pending, trialing, active, expired, canceled, failed]
        trialEndsAt:
          type: string
          format: date-time
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        priceCentsSnapshot:
          type: integer
          nullable: true
        currencySnapshot:
          type: string
          nullable: true
        isInTrial: { type: boolean }
        hasActiveSubscription:
          type: boolean
          description: True iff the employer has a trialing/active subscription right now.
        freeJobPostLimit:
          type: integer
          description: Snapshot of the current admin-configured free quota.
        jobsPostedCount:
          type: integer
          description: Total number of jobs this employer has posted (active + closed + draft).
        freeJobsRemaining:
          type: integer
          description: max(freeJobPostLimit - jobsPostedCount, 0). Always 0 when the feature is disabled (no quota to track).
        canPostJob:
          type: boolean
          description: |
            True when the employer is allowed to post another job. False
            when the feature is enabled, free quota is exhausted, and
            the employer has no active subscription.
        featureEnabled:
          type: boolean
          description: Mirror of EmployerSubscriptionSettings.isActive for convenience.
      required:
        - status
        - trialEndsAt
        - currentPeriodEnd
        - priceCentsSnapshot
        - currencySnapshot
        - isInTrial
        - hasActiveSubscription
        - freeJobPostLimit
        - jobsPostedCount
        - freeJobsRemaining
        - canPostJob
        - featureEnabled

