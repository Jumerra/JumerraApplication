    InstitutionDashboard:
      type: object
      properties:
        institutionId: { type: integer }
        institutionName: { type: string }
        totalStudents: { type: integer }
        placedStudents: { type: integer }
        placementRate: { type: number }
        averageReadiness: { type: integer }
        averageSalary: { type: integer }
        topEmployers:
          type: array
          items:
            type: object
            properties:
              employerId: { type: integer }
              employerName: { type: string }
              employerLogoUrl: { type: string }
              hires: { type: integer }
            required: [employerId, employerName, employerLogoUrl, hires]
        statusBreakdown:
          type: array
          items:
            type: object
            properties:
              status: { type: string }
              count: { type: integer }
            required: [status, count]
        recentHires:
          type: array
          items: { $ref: "#/components/schemas/InstitutionStudent" }
        placementsLocked:
          type: boolean
          description: |
            True when the global institution-subscription feature is
            enabled and this institution does NOT have an active or
