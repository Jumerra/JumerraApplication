      tags: [institutions]
      summary: Placement analytics for an institution (scoped to caller's faculty/department).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: facultyId
          schema: { type: integer }
        - in: query
          name: departmentId
          schema: { type: integer }
      responses:
        "200":
          description: Placement analytics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionPlacementAnalytics" }

  /institutions/{id}/leaderboard:
    get:
      operationId: getInstitutionCohortLeaderboard
      tags: [institutions]
      summary: |
        Public cohort placement leaderboard for an institution. Returns aggregate
        placement stats, top employers, salary bands by role family, and per-cohort
        drill-down rows. Returns 404 if the institution has opted-out of the public
        leaderboard. Salary bands enforce a 3-hire minimum to prevent deanonymisation.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: year
          required: false
          description: Optional cohort graduation year filter; if omitted, all cohorts are aggregated.
          schema: { type: integer }
        - in: query
          name: departmentId
          required: false
          description: Optional program/department filter.
          schema: { type: integer }
      responses:
        "200":
          description: Cohort leaderboard
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionCohortLeaderboard" }
        "404":
          description: Institution not found, or its public leaderboard is disabled.

  /institutions/{id}/analytics/employers-leaderboard:
    get:
      operationId: getInstitutionEmployersLeaderboard
      tags: [institutions]
      summary: Public top-employers-of-our-students leaderboard for the current academic year (Aug 1 of prior calendar year through Jul 31 of the named year).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Employers leaderboard
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionEmployersLeaderboard" }

  /institutions/{id}/cohorts:
