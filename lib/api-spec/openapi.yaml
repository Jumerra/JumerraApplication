openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Talent Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: candidates
    description: Candidate profiles
  - name: employers
    description: Employer profiles
  - name: institutions
    description: Educational institutions
  - name: jobs
    description: Job postings
  - name: applications
    description: Job applications
  - name: skills
    description: Skill catalog
  - name: dashboard
    description: Aggregated insights
  - name: auth
    description: Authentication and registration
  - name: admin
    description: Admin-only operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List candidates with optional filters
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: skill
          schema: { type: string }
        - in: query
          name: institutionId
          schema: { type: integer }
        - in: query
          name: minScore
          schema: { type: integer }
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Candidate" }
    post:
      operationId: createCandidate
      tags: [candidates]
      summary: Create candidate profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCandidate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Candidate" }
  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Candidate detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateDetail" }
    patch:
      operationId: updateCandidate
      tags: [candidates]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCandidate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Candidate" }

  /employers:
    get:
      operationId: listEmployers
      tags: [employers]
      parameters:
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200":
          description: Employers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Employer" }
    post:
      operationId: createEmployer
      tags: [employers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEmployer" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Employer" }
  /employers/{id}:
    get:
      operationId: getEmployer
      tags: [employers]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Employer detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployerDetail" }

  /institutions:
    get:
      operationId: listInstitutions
      tags: [institutions]
      responses:
        "200":
          description: Institutions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Institution" }
    post:
      operationId: createInstitution
      tags: [institutions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInstitution" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Institution" }
  /institutions/{id}:
    get:
      operationId: getInstitution
      tags: [institutions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Institution detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionDetail" }
  /institutions/{id}/students:
    get:
      operationId: listInstitutionStudents
      tags: [institutions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Students at institution with placement status
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InstitutionStudent" }
  /institutions/{id}/students/{candidateId}/verify:
    post:
      operationId: verifyInstitutionStudent
      tags: [institutions]
      summary: Mark a candidate as a verified student of this institution.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: candidateId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyStudentResponse" }
  /institutions/{id}/students/{candidateId}/unverify:
    post:
      operationId: unverifyInstitutionStudent
      tags: [institutions]
      summary: Revoke verification for a previously verified student.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: candidateId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Unverified
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: type
          schema:
            type: string
            enum: [internship, part_time, full_time, contract, remote]
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: remote
          schema: { type: boolean }
        - in: query
          name: employerId
          schema: { type: integer }
        - in: query
          name: featured
          schema: { type: boolean }
        - in: query
          name: skill
          schema: { type: string }
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Job" }
    post:
      operationId: createJob
      tags: [jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateJob" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobDetail" }
  /jobs/{id}/matches:
    get:
      operationId: getJobMatches
      tags: [jobs]
      summary: AI-style ranked candidate matches for a job
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ranked candidate matches
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CandidateMatch" }

  /candidates/{id}/recommendations:
    get:
      operationId: getCandidateRecommendations
      tags: [candidates]
      summary: AI-style ranked job recommendations for a candidate
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ranked job matches
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/JobMatch" }

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      parameters:
        - in: query
          name: candidateId
          schema: { type: integer }
        - in: query
          name: jobId
          schema: { type: integer }
        - in: query
          name: employerId
          schema: { type: integer }
        - in: query
          name: status
          schema:
            type: string
            enum: [applied, screening, interview, offer, hired, rejected, withdrawn]
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Application" }
    post:
      operationId: createApplication
      tags: [applications]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateApplication" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Application" }
  /applications/{id}:
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateApplication" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Application" }

  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      responses:
        "200":
          description: Skills catalog
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Skill" }

  /dashboard/platform:
    get:
      operationId: getPlatformStats
      tags: [dashboard]
      summary: Admin overview metrics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformStats" }

  /dashboard/employer/{id}:
    get:
      operationId: getEmployerDashboard
      tags: [dashboard]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Employer dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployerDashboard" }

  /dashboard/institution/{id}:
    get:
      operationId: getInstitutionDashboard
      tags: [dashboard]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Institution dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionDashboard" }

  /dashboard/candidate/{id}:
    get:
      operationId: getCandidateDashboard
      tags: [dashboard]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Candidate dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CandidateDashboard" }

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Cross-platform recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityItem" }

  /dashboard/salary-insights:
    get:
      operationId: getSalaryInsights
      tags: [dashboard]
      summary: Average salary by role/skill
      responses:
        "200":
          description: Salary insights
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SalaryInsight" }

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Registration accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterResponse" }
        "400": { description: Invalid input }

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "401": { description: Invalid credentials }
        "403": { description: Account not active }

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      responses:
        "200":
          description: Current session user (or null)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }

  /auth/setup-password:
    post:
      operationId: setupPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetupPasswordRequest" }
      responses:
        "200":
          description: Password set, user activated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthSession" }
        "400": { description: Invalid token or password }

  /auth/forgot-password:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Request a password reset link (always returns ok=true)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordRequest" }
      responses:
        "200":
          description: Request acknowledged (does not reveal whether email is registered)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "400": { description: Invalid input }

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangePasswordRequest" }
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "400": { description: Invalid input }
        "401": { description: "Not authenticated or current password incorrect" }

  /auth/setup-token/{token}:
    get:
      operationId: getSetupTokenInfo
      tags: [auth]
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Token info
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupTokenInfo" }
        "404": { description: Invalid or expired token }

  /admin/registrations:
    get:
      operationId: listRegistrations
      tags: [admin]
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, active, rejected, all]
      responses:
        "200":
          description: Registration list
          content:
            application/json:
              schema:
                type: object
                properties:
                  registrations:
                    type: array
                    items: { $ref: "#/components/schemas/Registration" }
                required: [registrations]
        "403": { description: Admin only }

  /admin/registrations/{id}/approve:
    post:
      operationId: approveRegistration
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegistrationDecisionBody" }
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "403": { description: Admin only }

  /admin/registrations/{id}/reject:
    post:
      operationId: rejectRegistration
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegistrationDecisionBody" }
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "403": { description: Admin only }

  /admin/onboard:
    post:
      operationId: onboardEntity
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OnboardRequest" }
      responses:
        "201":
          description: Onboarded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OnboardResponse" }
        "403": { description: Admin only }
        "409": { description: Email already in use }

  /admin/onboarded:
    get:
      operationId: listOnboardedUsers
      tags: [admin]
      responses:
        "200":
          description: Invited users awaiting password setup
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/OnboardedUser" }
                required: [users]
        "403": { description: Admin only }

  /admin/candidates/{id}:
    delete:
      operationId: adminDeleteCandidate
      tags: [admin]
      summary: Permanently remove a candidate and their related data (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "400": { description: Invalid id }
        "403": { description: Admin only }

  /admin/employers/{id}:
    delete:
      operationId: adminDeleteEmployer
      tags: [admin]
      summary: Permanently remove an employer and their jobs/applications (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "400": { description: Invalid id }
        "403": { description: Admin only }

  /admin/employers/{id}/verify:
    patch:
      operationId: adminSetEmployerVerified
      tags: [admin]
      summary: Toggle the employer verified flag (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetEmployerVerifiedRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetEmployerVerifiedResponse" }
        "400": { description: Invalid id }
        "403": { description: Admin only }
        "404": { description: Employer not found }

  /admin/institutions/{id}:
    delete:
      operationId: adminDeleteInstitution
      tags: [admin]
      summary: Permanently remove an institution and unlink its members (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "400": { description: Invalid id }
        "403": { description: Admin only }

  /site-content:
    get:
      operationId: getSiteContent
      tags: [site]
      summary: Public site content for the home page (admin-editable)
      responses:
        "200":
          description: All site content rows
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SiteContentResponse" }
    put:
      operationId: updateSiteContent
      tags: [site]
      summary: Bulk upsert site content (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSiteContentRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "400": { description: Invalid input }
        "403": { description: Admin only }

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List staff visible to the current user
      responses:
        "200":
          description: Staff members
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StaffListResponse" }
        "403": { description: Organization member access required }

  /staff/invite:
    post:
      operationId: inviteStaff
      tags: [staff]
      summary: Invite a teammate to the current org (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InviteStaffRequest" }
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteStaffResponse" }
        "400": { description: Invalid input }
        "403": { description: Owner access required }
        "409": { description: Email already in use }

  /staff/{id}:
    delete:
      operationId: removeStaff
      tags: [staff]
      summary: Remove a teammate (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }
        "400": { description: Invalid input }
        "403": { description: Owner access required }
        "404": { description: Member not found }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    AuthUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [candidate, employer, institution, admin]
        status:
          type: string
          enum: [pending, active, rejected, invited]
        orgRole: { type: string, nullable: true }
        candidateId: { type: integer, nullable: true }
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
      required: [id, email, fullName, role, status, orgRole, candidateId, employerId, institutionId]

    AuthSession:
      type: object
      properties:
        user:
          oneOf:
            - { $ref: "#/components/schemas/AuthUser" }
            - { type: "null" }
      required: [user]

    RegisterRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [candidate, employer, institution]
        submittedData:
          type: object
          additionalProperties: true
      required: [email, password, fullName, role]

    RegisterResponse:
      type: object
      properties:
        message: { type: string }
      required: [message]

    LoginRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    SetupPasswordRequest:
      type: object
      properties:
        token: { type: string }
        password: { type: string }
      required: [token, password]

    ForgotPasswordRequest:
      type: object
      properties:
        email: { type: string }
      required: [email]

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }
      required: [currentPassword, newPassword]

    SetupTokenInfo:
      type: object
      properties:
        email: { type: string }
        fullName: { type: string }
        role: { type: string }
      required: [email, fullName, role]

    Registration:
      type: object
