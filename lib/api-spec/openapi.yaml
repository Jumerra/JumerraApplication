          description: Add result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AddCohortMembersResponse" }

  /institutions/{id}/cohorts/{cohortId}/members/{candidateId}:
    delete:
      operationId: removeInstitutionCohortMember
      tags: [institutions]
      summary: Remove a candidate from a cohort.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: cohortId
          required: true
          schema: { type: integer }
        - in: path
