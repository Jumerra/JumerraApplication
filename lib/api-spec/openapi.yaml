          type: string
          format: date-time
          nullable: true
      required: [status, boostExpiresAt]

    InstitutionSubscriptionSettings:
      type: object
      properties:
        isActive: { type: boolean }
        priceCents: { type: integer, minimum: 50, maximum: 10000000 }
        currency: { type: string, description: "ISO 4217 lowercase, e.g. 'usd'" }
        trialDays:
          type: integer
          minimum: 0
          maximum: 365
          description: "Free trial length applied to every new subscription. 0 disables the trial."
      required: [isActive, priceCents, currency, trialDays]

    UpdateInstitutionSubscriptionSettingsRequest:
      type: object
      properties:
        isActive: { type: boolean }
        priceCents: { type: integer, minimum: 50, maximum: 10000000 }
        currency: { type: string }
        trialDays: { type: integer, minimum: 0, maximum: 365 }
      required: [isActive, priceCents, currency, trialDays]

    InstitutionSubscriptionStatus:
      type: object
      description: |
        Current subscription state for one institution. `status === 'none'`
        means no row exists (or only failed/expired/canceled rows exist) —
        the institution should see the subscribe CTA. `trialing` and
        `active` are the two states that unlock placements.
      properties:
        status:
          type: string
          enum: [none, pending, trialing, active, expired, canceled, failed]
        trialEndsAt:
          type: string
          format: date-time
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        priceCentsSnapshot:
          type: integer
          nullable: true
        currencySnapshot:
          type: string
          nullable: true
        isInTrial: { type: boolean }
        unlocksPlacements:
          type: boolean
          description: |
            True iff the institution currently has access to placement
            data. Equivalent to status in (trialing, active) AND
            currentPeriodEnd is in the future.
      required:
        - status
        - trialEndsAt
        - currentPeriodEnd
        - priceCentsSnapshot
        - currencySnapshot
        - isInTrial
        - unlocksPlacements

    EmployerSubscriptionSettings:
      type: object
      properties:
        isActive: { type: boolean }
        freeJobPostLimit:
          type: integer
          minimum: 0
          maximum: 1000
          description: "Number of jobs an employer can post for free before the paywall kicks in. 0 disables the free quota entirely."
        priceCents: { type: integer, minimum: 50, maximum: 10000000 }
        currency: { type: string, description: "ISO 4217 lowercase, e.g. 'usd'" }
        intervalDays:
          type: integer
          minimum: 1
          maximum: 365
          description: "Subscription billing interval in days (30 = monthly, 365 = yearly)."
        trialDays:
          type: integer
          minimum: 0
          maximum: 365
          description: "Free trial length applied to every new subscription. 0 disables the trial."
      required: [isActive, freeJobPostLimit, priceCents, currency, intervalDays, trialDays]

    UpdateEmployerSubscriptionSettingsRequest:
      type: object
      properties:
        isActive: { type: boolean }
        freeJobPostLimit: { type: integer, minimum: 0, maximum: 1000 }
        priceCents: { type: integer, minimum: 50, maximum: 10000000 }
        currency: { type: string }
        intervalDays: { type: integer, minimum: 1, maximum: 365 }
        trialDays: { type: integer, minimum: 0, maximum: 365 }
      required: [isActive, freeJobPostLimit, priceCents, currency, intervalDays, trialDays]

    EmployerSubscriptionStatus:
      type: object
      description: |
        Combined view of an employer's subscription state and their
        free-quota usage. `canPostJob` is what the UI should consult
        before showing the post-job CTA — it is true when the feature
        is disabled, when the employer is under the free quota, or when
        they have a trialing/active subscription.
      properties:
        status:
          type: string
          enum: [none, pending, trialing, active, expired, canceled, failed]
        trialEndsAt:
          type: string
          format: date-time
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        priceCentsSnapshot:
          type: integer
          nullable: true
        currencySnapshot:
          type: string
          nullable: true
        isInTrial: { type: boolean }
        hasActiveSubscription:
          type: boolean
          description: True iff the employer has a trialing/active subscription right now.
        freeJobPostLimit:
          type: integer
          description: Snapshot of the current admin-configured free quota.
        jobsPostedCount:
          type: integer
          description: Total number of jobs this employer has posted (active + closed + draft).
        freeJobsRemaining:
          type: integer
          description: max(freeJobPostLimit - jobsPostedCount, 0). Always 0 when the feature is disabled (no quota to track).
        canPostJob:
          type: boolean
          description: |
            True when the employer is allowed to post another job. False
            when the feature is enabled, free quota is exhausted, and
            the employer has no active subscription.
        featureEnabled:
          type: boolean
          description: Mirror of EmployerSubscriptionSettings.isActive for convenience.
      required:
        - status
        - trialEndsAt
        - currentPeriodEnd
        - priceCentsSnapshot
        - currencySnapshot
        - isInTrial
        - hasActiveSubscription
        - freeJobPostLimit
        - jobsPostedCount
        - freeJobsRemaining
        - canPostJob
        - featureEnabled

    CvSettings:
      type: object
      properties:
        isActive: { type: boolean }
        priceCents: { type: integer, minimum: 50, maximum: 1000000 }
        currency: { type: string }
      required: [isActive, priceCents, currency]

    UpdateCvSettingsRequest:
      type: object
      properties:
        isActive: { type: boolean }
        priceCents: { type: integer, minimum: 50, maximum: 1000000 }
        currency: { type: string }
      required: [isActive, priceCents, currency]

    VerifyCvCheckoutResponse:
      type: object
      properties:
        status:
          type: string
          enum: [paid, pending, failed, expired]
        unlocked: { type: boolean }
      required: [status, unlocked]

    GenerateCvRequest:
      type: object
      properties:
        focus:
          type: string
          nullable: true
          description: Optional free-text guidance, e.g. "target SRE roles".

    CandidateCvResponse:
      type: object
      properties:
        unlocked: { type: boolean }
        cvText:
          type: string
          nullable: true
        generatedAt:
          type: string
          format: date-time
          nullable: true
      required: [unlocked, cvText, generatedAt]

    UpdateSiteContentRequest:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              type:
                type: string
                enum: [text, image]
              value: { type: string }
            required: [key, type, value]
      required: [items]

    StaffMember:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [employer, institution, admin]
        orgRole: { type: string, nullable: true }
        status:
          type: string
          enum: [pending, active, rejected, invited]
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
        assignedDepartmentId:
          type: integer
          nullable: true
          description: |
            Optional department/program scope for non-owner institution
            staff. Null means org-wide. Owners always operate org-wide and
            ignore this field.
        assignedDepartmentName:
          type: string
          nullable: true
          description: Resolved name of the assigned department/program. Null when org-wide.
        createdAt: { type: string, format: date-time }
      required: [id, email, fullName, role, orgRole, status, employerId, institutionId, createdAt]

    StaffListResponse:
      type: object
      properties:
        members:
          type: array
          items: { $ref: "#/components/schemas/StaffMember" }
      required: [members]

    InviteStaffRequest:
      type: object
      properties:
        email: { type: string }
        fullName: { type: string }
        orgRole: { type: string }
        assignedDepartmentId:
          type: integer
          nullable: true
          description: |
            Optional department/program scope (institution staff only,
            non-owner roles). Must reference a department of the inviter's
            institution. Ignored for owner roles and for non-institution orgs.
      required: [email, fullName, orgRole]

    InviteStaffResponse:
      type: object
      properties:
        member: { $ref: "#/components/schemas/StaffMember" }
        setupUrl:
          type: string
          nullable: true
          description: One-time password setup URL. Only returned when emailSent is false (no email provider configured); otherwise null so the inviter cannot read someone else's token.
        expiresAt: { type: string, format: date-time }
        emailSent:
          type: boolean
          description: True if the setup link was delivered by the email provider; false if email is not configured.
      required: [member, expiresAt, emailSent]

    UpdateStaffRoleRequest:
      type: object
      properties:
        orgRole: { type: string }
        assignedDepartmentId:
          type: integer
          nullable: true
          description: |
            Optional department/program scope (institution staff only,
            non-owner roles). Set to null to clear and grant org-wide
            access. Omit to leave the existing scope unchanged. Ignored
            for owner roles and for non-institution orgs.
      required: [orgRole]

    StaffMemberResponse:
      type: object
      properties:
        member: { $ref: "#/components/schemas/StaffMember" }
      required: [member]

    AccountManagerSummary:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        status:
          type: string
          enum: [pending, active, rejected, invited]
        assignedEmployerCount: { type: integer }
        assignedInstitutionCount: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, email, fullName, status, assignedEmployerCount, assignedInstitutionCount, createdAt]

    AdminAccountManagersResponse:
      type: object
      properties:
        accountManagers:
          type: array
          items: { $ref: "#/components/schemas/AccountManagerSummary" }
      required: [accountManagers]

    AssignAccountManagerRequest:
      type: object
      properties:
        accountManagerId:
          type: integer
          nullable: true
          description: User id of an active account_manager admin, or null to unassign.
      required: [accountManagerId]

    AssignAccountManagerResponse:
      type: object
      properties:
        ok: { type: boolean }
        accountManagerId:
          type: integer
          nullable: true
      required: [ok, accountManagerId]
