      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        employerId: { type: integer, nullable: true }
        institutionId: { type: integer, nullable: true }
      required: [id, email, fullName, role, status, createdAt]

