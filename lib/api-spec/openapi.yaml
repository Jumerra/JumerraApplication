          type: array
          items: { $ref: "#/components/schemas/Job" }
        recentApplications:
          type: array
          items: { $ref: "#/components/schemas/Application" }
      required:
        - employerId
        - employerName
        - openJobs
        - totalApplications
        - interviewsScheduled
        - hires
        - averageMatchScore
        - pipelineByStage
        - topJobs
        - recentApplications

    InstitutionDashboard:
      type: object
      properties:
        institutionId: { type: integer }
        institutionName: { type: string }
        totalStudents: { type: integer }
        placedStudents: { type: integer }
        placementRate: { type: number }
        averageReadiness: { type: integer }
        averageSalary: { type: integer }
        topEmployers:
          type: array
          items:
            type: object
            properties:
              employerId: { type: integer }
              employerName: { type: string }
              employerLogoUrl: { type: string }
              hires: { type: integer }
            required: [employerId, employerName, employerLogoUrl, hires]
        statusBreakdown:
          type: array
          items:
            type: object
            properties:
              status: { type: string }
              count: { type: integer }
            required: [status, count]
        recentHires:
          type: array
          items: { $ref: "#/components/schemas/InstitutionStudent" }
        placementsLocked:
          type: boolean
          description: |
            True when the global institution-subscription feature is
            enabled and this institution does NOT have an active or
            trialing subscription. When true, the placement-specific
            arrays (`recentHires`, `topEmployers`, `statusBreakdown`)
            are zeroed out and the UI should render a paywall card.
        quotas:
          $ref: "#/components/schemas/InstitutionQuotaSnapshot"
      required:
        - institutionId
        - institutionName
        - totalStudents
        - placedStudents
        - placementRate
        - averageReadiness
        - averageSalary
        - topEmployers
        - statusBreakdown
        - recentHires
        - placementsLocked
        - quotas

    InstitutionQuotaSnapshot:
      type: object
      description: |
        Per-institution Starter-tier quota snapshot. `premium: true`
        means the institution has an active Institution Pro
        subscription and the caps in `limits` should be hidden from
        the UI (counts remain accurate so headline KPIs still work).
        For Starter institutions, the UI renders a progress bar per
        quota and surfaces an upgrade CTA as any value approaches
        its limit.
      properties:
        premium: { type: boolean }
        limits:
          type: object
          properties:
            verifiedStudents: { type: integer }
            faculties: { type: integer }
            departments: { type: integer }
            staffSeats: { type: integer }
          required: [verifiedStudents, faculties, departments, staffSeats]
        counts:
          type: object
          properties:
            verifiedStudents: { type: integer }
            faculties: { type: integer }
            departments: { type: integer }
            staffSeats: { type: integer }
          required: [verifiedStudents, faculties, departments, staffSeats]
      required: [premium, limits, counts]

    CandidateDashboard:
      type: object
      properties:
        candidateId: { type: integer }
        fullName: { type: string }
        talentScore: { type: integer }
        profileCompleteness: { type: integer }
        applicationsCount: { type: integer }
        interviewsCount: { type: integer }
        offersCount: { type: integer }
        statusBreakdown:
          type: array
          items:
            type: object
            properties:
              status: { type: string }
              count: { type: integer }
            required: [status, count]
        recommendedJobs:
          type: array
          items: { $ref: "#/components/schemas/JobMatch" }
        recentApplications:
          type: array
          items: { $ref: "#/components/schemas/Application" }
      required:
        - candidateId
        - fullName
        - talentScore
        - profileCompleteness
        - applicationsCount
        - interviewsCount
        - offersCount
        - statusBreakdown
        - recommendedJobs
        - recentApplications

    ActivityItem:
      type: object
      properties:
        id: { type: string }
        type:
          type: string
          enum: [application, hire, job_posted, candidate_joined, employer_joined]
        title: { type: string }
        subtitle: { type: string }
        avatarUrl: { type: string }
        timestamp: { type: string, format: date-time }
      required: [id, type, title, subtitle, avatarUrl, timestamp]

    SalaryInsight:
      type: object
      properties:
        role: { type: string }
        averageSalary: { type: integer }
        minSalary: { type: integer }
        maxSalary: { type: integer }
        currency: { type: string }
        sampleSize: { type: integer }
      required: [role, averageSalary, minSalary, maxSalary, currency, sampleSize]

    SalaryBand:
      type: object
      description: |
        Anonymised salary band from real hires. `insufficient: true`
        means fewer than the privacy floor (3) hires matched, so the
        percentile fields are omitted to avoid deanonymisation.
      properties:
        count: { type: integer }
        currency: { type: string }
        scope:
          type: string
          enum: [platform, institution]
        insufficient: { type: boolean }
        p25: { type: integer }
        p50: { type: integer }
        p75: { type: integer }
      required: [count, currency, scope, insufficient]

    ReportSalary:
      type: object
      properties:
        reportedSalary:
          type: integer
          description: Whole units of `reportedCurrency`, > 0.
        reportedCurrency:
          type: string
          description: ISO-4217 (e.g. GHS, USD).
      required: [reportedSalary, reportedCurrency]

    SiteContentItem:
