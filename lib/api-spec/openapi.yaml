  /employers/{id}/outreach:
    post:
      operationId: sendOutreach
      tags: [employer-pools]
      summary: Bulk-send a templated message to a set of candidates
      description: |
        Renders the supplied body (or template) per recipient, replacing
        `{{firstName}}`, `{{jobTitle}}`, and `{{employerName}}`. Writes an
        in-app notification to each candidate. Email delivery is queued
        (currently stubbed). Per-org daily cap (default 200/day) is
        enforced server-side.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendOutreachRequest" }
      responses:
        "200":
          description: Outreach result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SendOutreachResponse" }
        "400": { description: Validation failed }
        "403": { description: Not allowed }
        "429": { description: Daily outreach cap reached }


  /institutions/{id}/pending-endorsements:
    get:
      operationId: listPendingEndorsements
      tags: [institutions]
      summary: |
