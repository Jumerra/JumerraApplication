## Render Blueprint for Jumerra
##
## Apply with: Render Dashboard → New → Blueprint → connect this repo.
## Render reads this file and provisions everything below in one click.
##
## Services:
##   1. jumerra-api       — Express API (Node Web Service)
##   2. jumerra-web       — React/Vite frontend (Static Site)
##   3. jumerra-db        — Managed Postgres
##
## Object storage is intentionally NOT in this file — sign up for
## Cloudflare R2 separately (zero egress fees, ideal for African users)
## and set the S3_* env vars on jumerra-api manually after creation.

databases:
  - name: jumerra-db
    plan: basic-256mb # ~$7/mo. Bump to standard-1gb for >5k users.
    databaseName: jumerra
    user: jumerra
    region: frankfurt # closest Render region to West Africa
    postgresMajorVersion: "16"

services:
  # ---------------------------------------------------------------
  # API server
  # ---------------------------------------------------------------
  - type: web
    name: jumerra-api
    runtime: node
    plan: starter # ~$7/mo. Bump to standard for production traffic.
    region: frankfurt
    rootDir: . # build from repo root so pnpm workspace resolution works
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm --filter @workspace/api-server run build
      pnpm --filter @workspace/db run migrate
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000" # Render's default Node port; the API reads PORT
      # Database (auto-wired from the jumerra-db block above)
      - key: DATABASE_URL
        fromDatabase:
          name: jumerra-db
          property: connectionString
      # Generated once and stored encrypted by Render
      - key: SESSION_SECRET
        generateValue: true
      # CORS — fill in your real domain(s) after Phase 2
      - key: ALLOWED_ORIGINS
        value: https://jumerra.com,https://www.jumerra.com
      # ----- Secrets you set manually in Render dashboard -----
      # PAYSTACK_SECRET_KEY        (sk_live_... from Paystack dashboard)
      # PAYSTACK_WEBHOOK_SECRET    (Paystack dashboard → Webhooks)
      # RESEND_API_KEY             (from resend.com)
      # EMAIL_DEFAULT_FROM         e.g. "Jumerra <noreply@jumerra.com>"
      # STORAGE_BACKEND            "s3"  (added in Phase 2)
      # S3_ENDPOINT                Cloudflare R2 S3 endpoint
      # S3_BUCKET                  R2 bucket name
      # S3_ACCESS_KEY_ID           R2 access key
      # S3_SECRET_ACCESS_KEY       R2 secret
      # S3_PUBLIC_BASE_URL         R2 public-bucket URL (or CDN)
      # SENTRY_DSN_SERVER          (optional, from sentry.io)

  # ---------------------------------------------------------------
  # Web frontend (React + Vite, served as static files)
  # ---------------------------------------------------------------
  - type: web
    name: jumerra-web
    runtime: static
    region: frankfurt
    rootDir: .
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm --filter @workspace/talent-platform run build
    staticPublishPath: artifacts/talent-platform/dist
    autoDeploy: true
    # SPA fallback so wouter routes work on direct page loads / refresh
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Reverse-proxy /api/* to the API service so the browser stays
    # same-origin and cookie auth keeps working without CORS.
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      - key: VITE_API_BASE_URL
        value: https://jumerra-api.onrender.com
